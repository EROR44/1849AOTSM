 KSG_Xu_Dengzhi_t:0 "Сюй Дэнчжи"
 KSG_XU_DENGZHI_DESC:0 "Полное имя: Сюй Дэнчжи\nДата рождения: ок. 1800–1810 гг.\nМесто рождения: Лянчжоуская управа, провинция Ганьсу\n\nСюй Дэнчжи родился в семье потомственных военных. Его отец, Сюй Чжэнтай, дослужился до чина шоубэя (командира гарнизона) и в 1777 году по приказу командования был переведен с семьей на службу в Диход (современный Урумчи). Детство Дэнчжи прошло в гарнизонной среде, где мальчика с ранних лет обучали верховой езде, стрельбе из лука и воинской дисциплине. Он рос в атмосфере строгого порядка, где главными ценностями были честь, верность присяге и готовность в любой момент встать на защиту границ империи.\n\nЮность Сюй Дэнчжи пришлась на период активного освоения и укрепления Дихода и его окрестностей. Благодаря происхождению, а также проявленным на учениях и в мелких стычках способностям, он быстро заслужил репутацию надежного и исполнительного офицера. В 1826 году, когда в регионе вновь вспыхнули беспорядки, его подразделение было переброшено в Диход для усиления гарнизона . Служба в центральном гарнизоне стала трамплином для его карьеры. За усердие и грамотное руководство он получил назначение на пост бацзуна (начальника военной заставы) в стратегически важном городе Дабаньчэн . Его главной обязанностью стало управление обширными военно-земледельческими поселениями в Наньшане, в районах Тунгун, Эргун и Цигун . На этом посту он отвечал не только за оборону вверенной территории, но и за урожаи, снабжение гарнизонов и благополучие тысяч крестьян-поселенцев и их семей.\n\nК концу началу 1850-х годов Сюй Дэнчжи стал не просто командиром, а признанным и уважаемым лидером для значительной части китайского населения в регионе. Благодаря своей справедливости, умению разрешать споры и личной храбрости, он снискал авторитет как среди солдат, так и среди простых земледельцев и торговцев. В то время как центральная власть в Диходе слабела и была далека от нужд простых людей, люди из Наньшаня и Дабаньчэна уже видели в Сюй Дэнчжи своего главного защитника и заступника. Именно под его началом опытные ветераны и молодые, полные сил поселенцы, включая его сыновей, объединялись в негласные отряды для совместной защиты посевов и караванов от участившихся набегов разбойников."

