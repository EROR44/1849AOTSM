 #IDEAS
 
 TIB_nominal_authority_of_the_qing_empire:0 "Номинальная власть Империи Цин"
 TIB_nominal_authority_of_the_qing_empire_desc:0 "Власть империи Цин над Тибетом носит преимущественно номинальный характер. Император в Пекине считается верховным покровителем тибетского государства, однако, реального административного контроля почти не осуществляет. Управление в Лхасе находится в руках регента и высшего тибетского духовенства. Цин ограничивается редкими формальными вмешательствами, ритуальным утверждением перерождений через Золотую урну и символическим сюзеренитетом. Тибет сохраняет широкую внутреннюю автономию, фактически признавая императора Поднебесной, как духовно-политического покровителя."
 TIB_ambani:0 "Амбани"
 TIB_ambani_desc:0 "В Лхасе находятся два цинских амбаня - императорских резидента. Их резиденция располагается недалеко от Поталы. Амбани формально надзирают за внешними отношениями, военными делами и соблюдением «тибетских уложений» 1793 года. На практике их влияние ограничено: они могут давать рекомендации и отчитываться в Пекин, но реальная власть остаётся у тибетских регентов и монастырей. Амбани с небольшим отрядом солдат существуют в атмосфере почтительного, но холодного равнодушия со стороны местной знати и монахов."
 TIB_mountain_country:0 "Горное государство"
 TIB_mountain_country_desc:0 "Тибет - государство расположенное на «крыше мира»: высокогорном Тибетском плато, окружённом неприступными хребтами Гималаев и Куньлуня. Суровый климат, разреженный воздух и высокие горные барьеры создают сильную естественную изоляцию. Благодаря такому расположению страна хорошо защищена от недругов, но это приводит к нектороным другим трудностям."

 #CHARACTER

 TIB_Hedrup_Giaco_t:0 "Кхедруп Гьяцо"
 POLITICS_HEDRUB_GIACO_DESC:0 "Полное имя: Кхедруп Гьяцо\nДата рождения: 1 ноября 1838\nМесто рождения: Гартанг, близ Дарцедо, Кхам, Тибет\n\nКхедруп Гьяцо родился в 1838 году в деревне Гартанг в регионе Кхам (восточный Тибет), в том же месте, где ранее появился на свет 7-й Далай-лама. В 1841 году его признали реинкарнацией 10-го Далай-ламы, а в мае 1842 года торжественно возвели на трон в Потале. Церемонию проводил 7-й Панчен-лама Лобсанг Тенпай Ньима, который дал мальчику имя Кхедруп Гьяцо, постриг ему волосы и принял у него обеты. С ранних лет он обучался в монастырях Сера, Дрепунг и Ганден. В 1846 году он принял предварительные монашеские обеты, а в 1848–1849 годах - обеты послушника (гецул).\n\nВ детстве и юности Кхедруп жил под регентством, активно участвовал в религиозной жизни: посещал праздники, совершал паломничества, расширял летнюю резиденцию Норбулингка и даже написал аллегорическую книгу «История обезьян и птиц»."
 TIB_Ngawang_Yeshe_Tsultrim_Gyatso_t:0 "Нгаванг Еше Цултрим Гьяцо"
 POLITICS_NGAWANG_YESHE_TSUTRIM_GYATSO_DESC:0 "  "
 TIB_Trinley_Giaco_t:0 "Тринлей Гьяцо"
 POLITICS_TRINLEY_GIACO_DESC:0 "Полное имя: Тринлей Гьяцо\nДата рождения: 28 декабря 1856\nМесто рождения: Лхока, Центральный Тибет\n\nТринлей Гьяцо родился в конце 1856 года в регионе Лхока (южный Тибет) в семье Пхунцок Цеванга и Церинг Юдон. Это произошло вскоре после внезапной смерти предыдущего, 11-го Далай-ламы Кхедрупа Гьяцо. Мальчика довольно быстро обнаружили и в 1858 году привезли в Лхасу, где регент Ретинг Нгаванг Еше Цултрим выполнил церемонию пострига и дал ему имя Тринлей Гьяцо. В 1860 году, в возрасте около четырёх лет, его официально возвели на трон в Потале, а чуть позже приняли у него обеты послушника."

