 qin_viceroys_and_guvernors_chain_event.54.t:0 "Императорский указ о назначении губернатора Шендзин"
 qin_viceroys_and_guvernors_chain_event.54.d:0 "      Воля Неба неизменна. Мы, Сын Неба, владыка Великой Цин, повелеваем. Страна нуждается не в льстивых речах, но в твёрдой руке. Ицзин, ранее проявивший верность и твёрдость во благо Отечества, назначается губернатором провинции Шендзин с правом полного военного и гражданского управления. Ты отвечаешь за спокойствие от гор до моря, от границы до столицы уезда. Престол дарует тебе свою печать — не посрами её.\n\n      В твоём ведении находятся гарнизоны, арсеналы, продовольственные склады и пути сообщения. Ты имеешь право казнить дезертиров на месте, без сношения с Пекином. Ты обязан раз в три месяца доносить тронному секретарю о движении войск, состоянии амбаров и замирении горских племён. Если в провинции вспыхнет бунт — ты первый поднимаешь знамёна, последний садишься в седло. За упущение инициативы последует отставка с конфискацией имущества.\n\n      Помни: династия Цин не прощает слабости. Служи без лести, казни без страха. Если же ты сам поднимешь руку на казну или укроешь вора из страха перед местью — твоя участь будет хуже смерти: проклятие предков и забвение в летописях. Ступай и правь железной рукой в бархатной перчатке."
 qin_viceroys_and_guvernors_chain_event.54.a:0 "Утверждаю, [QIN.GetName]"

