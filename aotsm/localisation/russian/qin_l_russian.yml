 QIN_second_stage_of_conquering_the_sky:0 "Второй этап покорения неба"
 QIN_second_stage_of_conquering_the_sky_desc:0 "Этот этап знаменует новый рубеж в развитии воздушных технологий, открывая путь к более амбициозным проектам. Успех будет зависеть от координации усилий и внедрения передовых идей. Будущее небес начинает обретать форму благодаря нашим усилиям."
 QIN_research_in_light_aviation:0 "Изыскания в лёгкой авиации"
 QIN_research_in_light_aviation_desc:0 "Изыскания в области лёгких летательных аппаратов открывают новые горизонты для манёвренности и скорости. Это позволит нам глубже понять основы авиации и создать фундамент для будущих инноваций. Каждый шаг приближает нас к господству в воздухе."
 QIN_developments_of_feng_yelun:0 "Наработки Фен Елуня"
 QIN_developments_of_feng_yelun_desc:0 "Фен Елунь, вдохновлённый западными текстами, с юных лет проявлял интерес к полётам, изучая зарубежные рукописи о воздухоплавании. Его усилия и смелые эксперименты, опирающиеся на полученные знания, прокладывают путь к значительным прорывам в этой области."
 QIN_research_in_heavy_aviation:0 "Изыскания в тяжёлой авиации"
 QIN_research_in_heavy_aviation_desc:0 "Изыскания в области тяжёлых воздушных судов требуют значительных ресурсов и инженерной мысли. Это открывает возможности для создания мощных машин, способных нести большие нагрузки и преодолевать большие расстояния. Успех в этой области укрепит нашу военную и торговую мощь."
 QIN_purchase_of_light_aircraft_samples:0 "Закупка образцов лёгкой авиации"
 QIN_purchase_of_light_aircraft_samples_desc:0 "Приобретение образцов лёгких самолётов позволит нам изучить передовые технологии других народов. Это станет важным шагом для адаптации и улучшения наших собственных конструкций. Знания, полученные таким образом, дадут нам конкурентное преимущество."
 QIN_air_invite_foreign_specialists:0 "Применение иностранных специалистов"
 QIN_air_invite_foreign_specialists_desc:0 "Привлечение иностранных экспертов обеспечит нас уникальными знаниями и опытом в области авиации. Их участие ускорит развитие наших программ и повысит качество обучения пилотов. Это сотрудничество станет ключом к технологическому прорыву."
 QIN_create_nankin_pilot_school:0 "Создание школы пилотов в Нанкине"
 QIN_create_nankin_pilot_school_desc:0 "Открытие школы пилотов в Нанкине заложит основу для подготовки новых мастеров неба, вдохновлённых древними башнями, возвышающимися над городом. Это место, где некогда строились грандиозные сооружения, теперь станет колыбелью авиационного будущего. Здесь зародится новая эра лётчиков, готовых покорять высоты."
 QIN_purchase_of_heavy_aircraft_samples:0 "Закупка образцов тяжёлой авиации"
 QIN_purchase_of_heavy_aircraft_samples_desc:0 "Закупка образцов тяжёлых самолётов даст нам доступ к передовым разработкам других держав. Это позволит инженерам адаптировать и улучшить наши проекты для военных и гражданских нужд. Такой шаг укрепит нашу позицию в гонке за превосходство в воздухе."
 QIN_build_shengyan_industrial_zone:0 "Строительство шеньянской промышленной зоны"
 QIN_build_shengyan_industrial_zone_desc:0 "Создание промышленной зоны в Шэньяне станет основой для производства авиации, вдохновлённое старыми мастерскими, где когда-то ковались металлические конструкции. Это место, где некогда возводились внушительные здания, теперь превратится в центр инноваций и силы. Здесь начнётся массовое производство, способное изменить ход истории."

