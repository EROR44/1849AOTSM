 QIN_mass_focus:0 "Ставка на массовость"
 QIN_mass_focus_desc:0 "Подданные Небесной империи исчисляются сотнями миллионов - это неисчерпаемый источник силы, дарованный самим Небом. Мы сделаем ставку на людскую волну: бесчисленные ряды пехоты, способные затопить любое поле брани и сломить волю даже самого упорного неприятеля."
 QIN_russian_will:0 "Тактика «Русской воли»"
 QIN_russian_will_desc:0 "Не отступать ни на пядь земли, не склонять знамён перед численным или техническим превосходством врага. Давить упорством духа, неиссякаемым потоком подкреплений и железной волей к победе - до тех пор, пока противник не падёт духом и не запросит пощады."
 QIN_large_formation_training:0 "Тренировка крупных подразделений"
 QIN_large_formation_training_desc:0 "Разрозненные отряды легко разбиваются поодиночке. Мы будем готовить корпуса и целые армии к действию как единый гигантский организм: слаженные марши, одновременные удары флангов, взаимная поддержка частей - только такие крупные соединения способны разорвать неприятельский фронт."

 QIN_artillery_focus:0 "Ставка на артиллерию"
 QIN_artillery_focus_desc:0 "Гром пушек давно стал решающим голосом современных войн. Мы возведём артиллерию в ранг главной опоры армии: сотни тяжёлых орудий, массированные батареи, непрерывный огонь ядрами, картечью и гранатами - ничто не устоит перед таким огненным валом."
 QIN_grand_barrage_tactics:0 "Тактика масштабных артиллерийских обстрелов"
 QIN_grand_barrage_tactics_desc:0 "Когда сотни орудий открывают огонь одновременно, земля содрогается, а воздух наполняется свистом ядер и рёвом картечи. Мы отточим искусство такого огненного шквала, чтобы вражеские линии таяли, не успевая даже поднять головы из окопов и траншей."
 QIN_gun_mastery:0 "Главенство орудий"
 QIN_gun_mastery_desc:0 "В наш век артиллерия по праву зовётся царицей полей сражений. Мы сделаем так, чтобы наши батареи говорили громче любых европейских пушек: более дальнобойные орудия, более точные расчёты, более смертоносный огонь - и тогда голос Поднебесной будет услышан повсюду."

 QIN_planning_focus:0 "Ставка на планирование"
 QIN_planning_focus_desc:0 "Победа куётся не только доблестью солдат, но и мудростью полководцев в шатрах штабов. Тщательное изучение местности, расчёт сил и запасов, предвидение движений врага - вот что позволит нам вести кампании с холодной ясностью и обращать хаос сражений в нашу пользу."
 QIN_study_western_barbar:0 "Изучить опыт западных варваров"
 QIN_study_western_barbar_desc:0 "Заморские державы создали машины войны и порядки, способные сокрушать армии. Мы не станем слепо повторять их ошибки и предрассудки - напротив, внимательно изучим их тактику, вооружение и организацию, чтобы взять всё лучшее и соединить с нашей собственной воинской мудростью."
 QIN_chinese_legions:0 "Легионы с китайской спецификой"
 QIN_chinese_legions_desc:0 "Мы не будем рабски копировать западные образцы. Наша цель - создать новые легионы, в которых европейская военная наука сольётся с тысячелетней китайской традицией, с нашим пониманием дисциплины, иерархии и духа воинства, рождая силу, непостижимую для чужеземцев."

 QIN_break_window_in_the_future:0 "Прорубить окно в будущее"
 QIN_break_window_in_the_future_desc:0 ""

 QIN_blood_and_sweat:0 "Уроки крови и пота"
 QIN_blood_and_sweat_desc:0 "Каждая проигранная битва, каждый оставленный окоп, каждая пролитая капля крови наших воинов - это суровый учитель. Мы обязаны глубоко осмыслить уроки недавних поражений и унижений, извлечь из них горькую мудрость и превратить слабости в будущую несокрушимую мощь государства."
 QIN_army_standardization:0 "Стандартизация армии"
 QIN_army_standardization_desc:0 "Разнобой в калибрах, уставах и обучении порождает хаос и слабость. Мы введём единые стандарты: одинаковые ружья и пушки, общие наставления по строевой и тактике, единая система подготовки - и тогда армия превратится в монолитный, послушный и грозный инструмент воли Императора."
 QIN_specialized_production:0 "Создание специализированных производств"
 QIN_specialized_production_desc:0 "Разбрасывать силы по всем ремёслам сразу - значит не достичь совершенства ни в одном. Мы учредим особые арсеналы и мануфактуры: одни будут лить ядра и гранаты, другие ковать штыки и сабли, третьи мастерить лафеты и повозки - так родится превосходство в снабжении войск."
 QIN_re_equipment:0 "Переоснащение подразделений"
 QIN_re_equipment_desc:0 "Старые кремнёвые ружья, изношенные фальконеты и устаревшие лафеты более не соответствуют требованиям времени. Мы начнём масштабное перевооружение: новые нарезные ружья, современные пушки, улучшенные повозки и амуниция - армия получит оружие, достойное великой державы."
 QIN_specialist_training:0 "Обучение специалистов"
 QIN_specialist_training_desc:0 "Рядовой солдат важен, но без искусных мастеров победа недостижима. Мы создадим школы и лагеря квалифицированных специалистов военного дела - истинных творцов победы на поле боя."
 QIN_arsenal_expansion:0 "Расширение сети арсеналов"
 QIN_arsenal_expansion_desc:0 "От застав Великой стены на севере до южных морей, от западных гор до восточных равнин - повсюду должны подниматься дымы кузниц, стучать молоты и  вращаться станки. Только широкая сеть арсеналов даст нам неиссякаемый поток пороха, ядер, ружей и пушек для грядущих войн."
 
 QIN_complete_military_modernization:0 "Завершить модернизацию войск"
 QIN_complete_military_modernization_desc:0 "Когда пролитая кровь воинов, пот тружеников заводов и звон железа на арсеналах сольются в единое целое - тогда родится новая армия Поднебесной: дисциплинированная, хорошо вооружённая, обученная по последнему слову науки и готовая повергнуть любого, кто осмелится бросить вызов великой империи."

