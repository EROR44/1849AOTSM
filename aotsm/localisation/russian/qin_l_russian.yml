 qin_great_embassy_event.7.t:0 "Прошение о приеме «Великого посольства»"
 qin_great_embassy_event.7.d:0 "Его Величеству Императору Японии\n\n      От имени Его Величества Императора Поднебесной и по поручению Великого Совета империи с глубочайшим уважением обращаемся к Вашему Величеству с официальной просьбой о приёме и всестороннем содействии «Великому посольству Империи Цин». Данная высокопоставленная миссия, состоящая из опытных дипломатов, чиновников, учёных и инженеров, направляется в Вашу страну с единственной целью — подробного и систематического ознакомления с передовыми промышленными предприятиями, технологическими процессами и организацией производства в Японии. Мы глубоко заинтересованы в изучении современных фабрик, механизированных мастерских, судостроительных и машиностроительных заводов, а также методов применения паровых машин, металлургии и других достижений промышленности, которые обеспечивают быстрое развитие Вашей страны.\n\n      Просим Ваше Величество милостиво разрешить членам посольства посещение промышленных объектов, предоставить возможность наблюдать за производственными процессами, ознакомиться с оборудованием и принципами организации труда, а также оказать необходимое содействие в сборе технических сведений и материалов. Правительство Поднебесной убеждено, что такой обмен знаниями послужит укреплению взаимного уважения и развитию дружественных связей между нашими государствами. Заранее выражаем искреннюю признательность за благосклонное рассмотрение нашей просьбы и надеемся на скорейшее положительное решение."
 qin_great_embassy_event.7.a:0 "Мы можем извлечь из этого пользу, но нужно сохранять осторожность."
 qin_great_embassy_event.7.b:0 "Пустить китайцев на наши производства? Что за бред..."

 qin_great_embassy_event.8.t:0 "Правительство Конфедерации принимает прошение"
 qin_great_embassy_event.8.d:0 "      Правительство Конфедерации высоко оценило стремление Империи Цин к освоению передовых достижений промышленности и приветствует инициативу по обмену знаниями и опытом между нашими государствами. Мы готовы оказать содействие миссии в ознакомлении с работой фабрик, машиностроительных и металлургических заводов, судоверфей, железнодорожных мастерских и других ключевых промышленных объектов. Членам посольства будет предоставлена возможность посещать предприятия, наблюдать за производственными процессами, изучать оборудование, методы организации труда и технические новшества под руководством компетентных специалистов и переводчиков. Для удобства пребывания будут выделены соответствующие помещения, обеспечена безопасность и оказано необходимое содействие в сборе технической документации и материалов. Мы убеждены, что такой конструктивный обмен послужит укреплению взаимопонимания, развитию дружественных отношений и принесёт пользу обеим сторонам. Ждём прибытия делегации в удобное для неё время и готовы приступить к организации визита без промедления."
 qin_great_embassy_event.8.a:0 "Отлично!"

 qin_great_embassy_event.9.t:0 "Правительство Конфедерацииотклоняет прошение"
 qin_great_embassy_event.9.d:0 "      С сожалением сообщаем, что в настоящее время просьба о приёме «Великого посольства» не может быть удовлетворена. В силу сложившейся внутриполитической и внешнеполитической обстановки, а также в целях обеспечения национальной безопасности и сохранения конфиденциальности ключевых технологических процессов, мы вынуждены воздержаться от допуска иностранных миссий к осмотру стратегически важных промышленных объектов, включая фабрики, верфи, арсеналы, машиностроительные и металлургические заводы. Мы высоко ценим интерес Поднебесной к достижениям современной промышленности и понимаем мотивы, побудившие к формированию столь представительной делегации, однако в текущих условиях считаем подобный обмен преждевременным."
 qin_great_embassy_event.9.a:0 "Печально."
 
