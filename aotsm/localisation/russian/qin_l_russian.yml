 qin_viceroys_and_guvernors_chain_event.3.t:0 "Указ Его Императорского Величества о назначении наместника Чжили"
 qin_viceroys_and_guvernors_chain_event.3.d:0 "      Небо ниспослало Маньчжурской династии великий мандат на управление Поднебесной. Мы, император Великой Цин, внимая воле Неба и следуя заветам предков, даруем сей указ. Усмирение границ, искоренение разбоя и благоденствие народа суть главные заботы Престола. Принимая во внимание верную службу и испытанную добродетель Цзунжи Цинци, который ранее являл усердие на благо Отечества, Мы не сомневаемся в его преданности. Посему, превыше всяких сомнений и споров, Мы назначаем Цзунжи Цинци на пост вице-короля Чжили, жалуя полный титул и серебряную печать для управления вверенными землями.\n\n      Назначенному наместнику повелевается: немедля по получении сего указа прибыть в Баодин и приступить к делам. Ты будешь ведать всеми военными и гражданскими делами провинции, надзирать за деятельностью чиновников всех рангов, от уездных магистратов до генералов гарнизонов. В твою прямую обязанность входит сбор налогов в полном объёме, содержание ирригационной системы в исправности, а также командование гарнизоном на вверенных землях для подавления любых беспорядков. Ты имеешь право докладывать тронному секретарю напрямую, минуя промежуточные инстанции, но помни: каждое твое решение должно быть взвешенным и во славу династии.\n\n      О сем указе ведать: непослушание приказам наместника карается как нарушение императорской воли. Если же сам наместник пренебрежет службой, допустит рост коррупции или утратит вверенные ему земли — его постигнет высшая мера наказания вплоть до истребления всего рода. Скрижаль Неба и Земли свидетельствует. Да исполнится воля династии Цин. Почтительно служи, и да не посрамишь доверия."
 qin_viceroys_and_guvernors_chain_event.3.a:0 "Утверждаю, [QIN.GetLeader]"

