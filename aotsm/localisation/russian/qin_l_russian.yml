 qin_viceroys_and_guvernors_chain_event.45.t:0 "Высочайшее повеление о назначении вице-короля Сычуань"
 qin_viceroys_and_guvernors_chain_event.45.d:0 "      Да будет известно всем чиновникам, военным и статским, а также подданным всех знамён. Его Императорское Величество, владыка государства Великая Цин, усмотрев необходимость усилить административное начало во вверенном регионе, повелел: наместником Сычуань назначить Сюй Цзечуня. Престол ценит его аккуратность, знание уложений и многолетнюю беспорочную службу. Назначение вступает в силу по получении сего указ.\n\n      Новому наместнику надлежит принять дела по описи от предыдущего правителя в семидневный срок. В его обязанности входит: контроль над сбором земельного налога , надзор за почтовыми станциями, управление гарнизоном войск, а также ежемесячное рассмотрение тяжб в апелляционном порядке. Наместник не имеет права покидать столицу провинции без письменного разрешения императорского секретариата. Ежеквартально подаётся «всеподданнейший доклад» о трёх главных проблемах региона.\n\n      За неисполнение предписаний вышестоящих инстанций наместник несёт личную ответственность вплоть до лишения рангов. За успешное выполнение норм сбора налогов и отсутствие жалоб от населения император жалует почётным халатом и правом представления ко двору раз в пять лет."
 qin_viceroys_and_guvernors_chain_event.45.a:0 "Да будет так. Скреплено императорской печатью."

