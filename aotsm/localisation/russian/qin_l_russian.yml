 qin_great_embassy_event.6.d:0 "Его Превосходительству Протектору Российского Государства\n\n      От имени Его Величества Императора Поднебесной и по поручению Великого Совета империи с глубочайшим уважением обращаемся к Вашему Величеству с официальной просьбой о приёме и всестороннем содействии «Великому посольству Империи Цин». Данная высокопоставленная миссия, состоящая из опытных дипломатов, чиновников, учёных и инженеров, направляется в Вашу страну с единственной целью — подробного и систематического ознакомления с передовыми промышленными предприятиями, технологическими процессами и организацией производства в России. Мы глубоко заинтересованы в изучении современных фабрик, механизированных мастерских, судостроительных и машиностроительных заводов, а также методов применения паровых машин, металлургии и других достижений промышленности, которые обеспечивают быстрое развитие Вашей страны.\n\n      Просим Ваше Превосходительство милостиво разрешить членам посольства посещение промышленных объектов, предоставить возможность наблюдать за производственными процессами, ознакомиться с оборудованием и принципами организации труда, а также оказать необходимое содействие в сборе технических сведений и материалов. Правительство Поднебесной убеждено, что такой обмен знаниями послужит укреплению взаимного уважения и развитию дружественных связей между нашими государствами. Заранее выражаем искреннюю признательность за благосклонное рассмотрение нашей просьбы и надеемся на скорейшее положительное решение."
