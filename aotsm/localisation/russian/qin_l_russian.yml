 ##START_IDEAS
 
 QIN_stagnation_of_empire_1:0 "Стагнация Империи"
 QIN_stagnation_of_empire_1_desc:0 "§YИмперия Цин§! находится в состоянии §Oглубокой§! §Rстагнации§!. Военные поражения в §YЧайной войне§! и последовавшей за ней §YКитайско-японской войне§! привели к утрате контроля над портами и ослаблению авторитета правящей династии, как внутри страны, так и за ее приделами.\n\nЭкономическая и техническая отсталость страны усугубляется повсеместной коррупцией и истощением казны. Крестьянство §Oохвачено брожением§!, что создаёт постоянную §Oугрозу§! внутренней стабильности. Без срочных и решительных реформ государство рискует §Oутратить§! суверенитет и столкнуться с §Oполной дезорганизацией§! управления."
 QIN_backward_army:0 "Отсталая Армия"
 QIN_backward_army_desc:0 "Армия §YИмперии Цин§! находится в §Oглубоком упадке§! и §Oне соответствует§! требованиям ведения современной войны. Основные силы - многочисленные, но разрозненные соединения «§Yвосьмизнамённой армии§!» и «§Yвойск зелёного знамени§!» - §Oне имеют§! боевого опыта и годны лишь для полицейских функций. Флот состоит из §Oустаревших§! деревянных джонок, артиллерия представлена устаревшими орудиями, а полевая артиллерия практически отсутствует.\n\nБоевые столкновения в ходе §YЧайной§! и §Yкитайско-японской войн§! показали §Rполную неспособность§! войск противостоять противнику, оснащенному современной экипировкой. Потери китайской армии значительно превышают потери неприятеля, а моральный дух личного состава остаётся крайне низким. Попытки реорганизации и модернизации до сих пор не принесли результатов из-за коррупции, нехватки средств и сопротивления на местах."
 QIN_peoples_riots:0 "Крестьянские бунты"
 QIN_peoples_riots_desc:0 "Внутри страны §Oстремительно растёт§! §Rкрестьянское недовольство§!. Малоземелье, непомерные налоги и повсеместная коррупция довели народ до отчаяния. Крестьяне задыхаются от поборов, а власти лишь ужесточают притеснения, не предлагая никакого решения проблем.\n\nПосле унизительных поражений в §YЧайной§! и §Yяпоно-китайской войнах§! империя уже не в силах держать ситуацию под контролем. Деморализованная армия не способна эффективно подавлять бунты, которые перекидываются из провинции в провинцию. Голодные крестьяне жгут поместья и громят казённые склады, а волна народного гнева с каждым годом нарастает."
 QIN_threaty_of_nankin:0 "Нанкинский договор"
 QIN_threaty_of_nankin_desc:0 "Нанкинский договор §G1842§! года стал унизительным итогом §Oпоражения§! §YИмперии Цин§! в §YЧайной войне§!. Этот неравноправный акт зафиксировал кабальную контрибуцию в §G600§! миллионов лянов серебра и передачу §YГонконга Нидерландам§!.\n\nДля §YЦин§! договор обернулся §Rкатастрофой§!: открытие портов для европейцев, вместе с потерей контроля над торговлей и репарациями привели к §Oистощению§! казны Поднебесной и §Oросту недовольства§! внутри страны."
 QIN_silk_road:0 "Шелковый путь"
 QIN_silk_road_desc:0 "§YШёлковый путь§! на протяжении веков остаётся главной торговой артерией, связывающей §YКитай§! с §YРомейской империей§! и другими западными рынками. Благодаря этому маршруту китайские товары - чай, шёлк и фарфор - пользуются неизменным спросом по всей §YЕвразии§!. Торговля §Gприносит империи§! §Yстабильный доход§!, а казна пополняется за счёт пошлин и сборов. Даже в условиях внешнего давления связи с западными партнёрами продолжают поддерживаться.\n\n§YРомейская империя§!, контролирующая ключевые узлы §YШёлкового пути§!, остаётся надёжным торговым партнёром §YЦин§!. Взаимовыгодный обмен товарами укрепляет позиции обеих держав. Несмотря на трудности последних лет, караванная торговля постепенно восстанавливается, открывая новые возможности для китайских купцов. Шёлковый путь по-прежнему остаётся важнейшим мостом между Востоком и Западом, и §YИмперия Цин§! намерена и дальше использовать его преимущества для развития собственной экономики."

 ##ARMY_IDEAS

 QIN_backward_army_1:0 "Отсталая армия"
 QIN_backward_army_1_desc:0 "Армия §YИмперии Цин§! находится в §Oглубоком упадке§! и §Oне соответствует§! требованиям ведения современной войны. Основные силы - многочисленные, но разрозненные соединения «§Yвосьмизнамённой армии§!» и «§Yвойск зелёного знамени§!» - §Oне имеют§! боевого опыта и годны лишь для полицейских функций. Флот состоит из §Oустаревших§! деревянных джонок, артиллерия представлена устаревшими орудиями, а полевая артиллерия практически отсутствует.\n\nБоевые столкновения в ходе §YЧайной§! и §Yкитайско-японской войн§! показали §Rполную неспособность§! войск противостоять противнику, оснащенному современной экипировкой. Потери китайской армии значительно превышают потери неприятеля, а моральный дух личного состава остаётся крайне низким. Попытки реорганизации и модернизации до сих пор не принесли результатов из-за коррупции, нехватки средств и сопротивления на местах."

 QIN_backward_army_2:0 "Отсталая армия"
 QIN_backward_army_2_desc:0 "Армия §YИмперии Цин§! по-прежнему находится в §Oтяжёлом состоянии§!, однако первые §Gпризнаки улучшения§! уже заметны. Основная масса соединений «§Yвосьмизнамённой армии§!» и «§Yвойск зелёного знамени§!» всё ещё §Oнебоеспособна§!, но отдельные §Gпилотные части§! начали получать современное вооружение и подготовку.\n\nФлот всё ещё состоит преимущественно из §Oустаревших§! деревянных джонок, однако закуплены первые паровые канонерки. Полевая артиллерия остаётся в зачаточном состоянии, но §Gпервые батареи§! уже сформированы.\n\nПоражения в войнах показали §Rнеобходимость перемен§!, и хотя коррупция и нехватка средств продолжают тормозить реформы, §Gдвижение вперёд§! всё же началось. Боевой дух личного состава остаётся низким, но в реформируемых частях наблюдается §Gосторожный подъём§!."

 QIN_backward_army_3:0 "Отсталая армия"
 QIN_backward_army_3_desc:0 "Состояние армии §YИмперии Цин§! §Gзаметно улучшилось§! по сравнению с недавним прошлым, хотя до полноценной боеспособности ещё §Oдалеко§!. Соединения «§Yвосьмизнамённой армии§!» и «§Yвойск зелёного знамени§!» проходят §Gпланомерную реорганизацию§! — многие части перевооружены, устаревшие расформированы.\n\nФлот получил несколько современных кораблей, хотя основу по-прежнему составляют старые суда. Полевая артиллерия §Gначинает появляться§! в войсках, и её наличие уже не является редкостью.\n\nОпыт войн усвоен: тактика и стратегия постепенно §Gпересматриваются§!. Коррупция сократилась благодаря ужесточению контроля, а финансирование армии §Gувеличено§!. Боевой дух личного состава §Gрастёт§!, особенно в частях, прошедших реформы. Однако §Yсохраняются ещё значительные проблемы§!, требующие дальнейших усилий."

 QIN_backward_army_4:0 "Отсталая армия"
 QIN_backward_army_4_desc:0 "Армия §YИмперии Цин§! находится на §Gподъёме§! и постепенно приближается к современным стандартам. Большинство соединений «§Yвосьмизнамённой армии§!» и «§Yвойск зелёного знамени§!» §Gреорганизованы§! или заменены новыми формированиями. Боевой опыт, пусть и горький, §Gусвоен§! и применяется на практике.\n\nПолевая артиллерия стала §Gнеотъемлемой частью§! большинства соединений.\n\nКоррупция взята под контроль, финансирование осуществляется регулярно. Боевой дух войск §Gзначительно вырос§! — армия начинает верить в свои силы. §YОтдельные очаги отсталости§! ещё сохраняются, но они уже не определяют облик вооружённых сил. Империя §Gготова защищать свои интересы§! гораздо эффективнее, чем прежде."

