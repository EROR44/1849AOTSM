 qin_army_event.1.t:0 "Чжэндунь инъу"
 qin_army_event.1.d:0 "      Состояние «Восьмизнамённой армии» вызывает глубокую тревогу. Эти войска, составлявшие некогда опору престола, ныне практически утратили боеспособность. Офицерские должности передаются по наследству без внимания к личным качествам и выучке. Знаменосцы обременены семьями и хозяйством, проживая непосредственно в лагерях, кои давно превратились в подобие посадов. Регулярные учения не проводятся, дисциплина пала, а вместо службы процветает обустройство быта. Попытки требовать от таких людей немедленного выступления в поле обречены на провал.\n\n      Что касается армии «Зелёного стяга», то здесь корень зол кроется в слабой подготовке личного состава и хроническом недостатке казны. Подразделения комплектуются из числа крестьян, коих набирают без должного отбора. Обучение сводится к редким смотрам, а не к систематическим занятиям. Жалование скудно и выдается нерегулярно. Финансирование столь убого, что не хватает ни на ремонт казарм, ни на закупку пороха. При такой организации рассчитывать какую либо адекватную боеспособность подразделений не приходится.\n\n      Сейчас, перед нами встало трудное решение.Первый путь - реорганизовать всю «Восьмизнамённую армию», сломав наследственную систему и вернув войска к регулярным занятиям. Сие потребует многих лет и казны, но сохранит верные знамёна как опору династии. Второй путь - сосредоточить усилия на «Зелёном стяге», нарастив финансирование и введя обязательную подготовку для каждого рекрута. Это даст быстрый результат в полевых частях, а также позволит впоследствии применить реформы и в других подразделениях."
 qin_army_event.1.a:0 "Проведем реформы во всех подразделениях."
 qin_army_event.1.b:0 "Сосредоточим ресурсы на армии «Зелёного стяга»."

 qin_army_event.2.t:0 "Чжэндунь циу"
 qin_army_event.2.d:0 "      Высочайшим указом его величества повелено приступить к всеобщей реорганизации восьмизнамённой армии. Отныне наследственное занятие офицерских должностей отменяется, а продвижение по службе определяется единственно боевыми заслугами и личной выучкой. Знаменосцам, обременённым семействами и хозяйством, предписано в кратчайший срок покинуть лагерные территории, дабы сии места служили исключительно для учений, а не для проживания. Установлены регулярные военные сборы, коих надлежит проводить не менее трёх раз в седмицу. Для надзора за исполнением указа учреждается особая инспекция из числа столичных сановников.\n\n      Сии меры встречают как одобрение, так и глухое сопротивление. Многие знаменные командиры, привыкшие к безделью и поборам, пытаются саботировать реформу, ссылаясь на «древние заветы предков». Однако император непреклонен: потерянные в минувших войнах территории и унизительные договоры показали, сколь опасна гнилостная немощь армии. На место нерадивых офицеров назначаются люди, доказавшие верность на поле боя. Казна выделяет дополнительные средства на закупку мушкетов и пороха. Лагеря начинают наполняться не праздными разговорами, а звуками строевой подготовки.\n\n      Отныне армия империи не будет прежней. Старые порядки, при коих знаменосец считал службу обузой, а не долгом, уходят в прошлое. Впереди — долгие годы трудов и лишений. Но лишь так можно вернуть войскам утраченную силу и вновь сделать династию Цин грозой для врагов. Перемены уже начались, и сей процесс не остановить."
 qin_army_event.2.a:0 "Поднять знамена - время реформ настало!"

 qin_army_event.5.t:0 "Синь ши люйин"
 qin_army_event.5.d:0 "      Поражения в минувших войнах со всей очевидностью показали, что старая система «Зелёных знамён» более не способна защищать пределы империи. Сии части, набираемые из необученных крестьян и получавшие скудное жалование, не могли противостоять организованному неприятелю ни на суше, ни на море. Губернаторы провинций, неоднократно пытались реорганизовать люйин, однако их усилия носили разрозненный характер. Назревшая необходимость требует ныне решительного разрыва с порочной традицией при сохранении старого армейского каркаса. Так рождается замысел «Зелёного знамени нового образца».\n\n      Суть преобразований заключается в трёх главных мерах. Первое: нарастить финансирование сих частей, дабы солдаты получали жалование исправно и не отвлекались на побочные заработки. Второе: ввести обязательные регулярные учения для всего личного состава, от рядового до командира полка. Третье: вооружить «Зелёное знамя» западными винтовками и пушками, закупаемыми через купеческие гильдии. Старые мушкеты и копья отныне подлежат сдаче на склады. Слабообученного рекрута надлежит за два года превратить в настоящего солдата.\n\n      Конечно, сии меры потребуют немалых средств из провинциальных казн. Кое-где местные чиновники уже ропщут, жалуясь на разорение. Но иного пути нет. Лишь крепкое, обученное и хорошо вооружённое «Зелёное знамя» сможет прикрыть границы и поддержать порядок внутри страны. Императорский двор выражает полную поддержку начинанию. Отныне люйин вступает на путь обновления."
 qin_army_event.5.a:0 "Настало время реорганизовать «Зелёное знамя»"

 qin_navy_event.1.t:0 "Доклад о состоянии флота"
 qin_navy_event.1.d:0 "На подписание Его Превосходительству, Министру Войны\n\n      По всеподданнейшему докладу Комиссии по морской обороне, нынешнее состояние военно-морских сил Империи вызывает глубочайшую озабоченность. Основу флота по-прежнему составляют джонки, оснащенные устаревшими парусами и неспособные противостоять броненосным паровым судам современных держав. Их артиллерия не имеет достаточной дальности и мощи, чтобы нанести урон кораблям противника до их сближения для абордажного боя. Существующий флот ныне может применяться лишь для борьбы с пиратами, но не для защиты наших морских рубежей от внешней угрозы, исходящей от таких стремительно развивающихся соседей, как Япония.\n\n      Сравнительный анализ демонстрирует катастрофическое отставание. В то время как флоты Конфедерации и Ромейской Империи повсеместно переходят на паровую тягу, а японцы активно перенимают их опыт, наши верфи продолжают строить суда по лекалам минувших веков. Отсутствие современных карт, навигационных приборов и систем обучения артиллеристов делает любую конфронтацию с современным противником на море заранее проигранной, о чем убедительно свидетельствуют итоги недавних конфликтов: Чайной и Японо-китайской войн.\n\n      В связи с вышеизложенным, Комиссия признает насущной и жизненно необходимой немедленную модернизацию флота на новых основаниях. Требуется в неотложном порядке учредить программы по закупке за рубежом и последующей постройке паровых канонерских лодок, созданию современных арсеналов для производства нарезных орудий и подготовке офицерских кадров, сведущих в новейшей морской тактике. Лишь переняв передовые достижения, мы сможем в будущем создать надежный щит для защиты береговой линии и суверенитета Небесной Империи, обеспечив ей достойное место среди великих морских держав."
 qin_navy_event.1.a:0 "Мы должны учиться у варваров, что бы противостоять им."

 qin_navy_event.2.t:0 "Подготовка к отправке делегации в Ромею"
 qin_navy_event.2.d:0 "      Ромейская империя поддерживает многолетние дружественные отношения с нами, а так же, является важным торговым партнером по Великому шелковому пути, рассматривается как потенциальный союзник в области модернизации военно-морского флота. В настоящее время предлагается направить официальное предложение о начале сотрудничества, включающего технологическую помощь в судостроении, содействие в организации современных верфей и возможную закупку лицензий на строительство военных кораблей.\n\n      В рамках подготовки к визиту предполагается направить официальный запрос через дипломатические каналы с предложением о приеме делегации в Константинополе. После получения предварительного согласия планируется сформировать группу специалистов для ознакомления с судостроительными предприятиями и портовой инфраструктурой."
 qin_navy_event.2.a:0 "Так чего же мы ждем? Направляйте предложение!"

 qin_navy_event.3.t:0 "[QIN.GetName] просит о технологическом содействии"
 qin_navy_event.3.d:0 "      Правительство Империи Цин направило официальный запрос о предоставлении технологического содействия в развитии военно-морского флота. Китайская сторона выражает заинтересованность в получении современных кораблестроительных технологий, создании совместных верфей и приобретении лицензий на строительство военных кораблей. Данное предложение затрагивает вопросы стратегического характера и требует тщательного анализа.\n\n      При положительном рассмотрении запроса возможно направление группы технических специалистов для детальной оценки потребностей и разработки комплексной программы сотрудничества. Это позволит установить долгосрочное партнерство в военно-морской сфере и создать основу для взаимовыгодного технологического обмена между нашими государствами.\n\n      Отклонение запроса может быть мотивировано соображениями технологической безопасности и необходимостью соблюдения существующих международных обязательств. Однако такой шаг способен негативно повлиять на двусторонние отношения и ограничить возможности для будущего взаимодействия в других областях сотрудничества."
 qin_navy_event.3.a:0 "Мы сможем получить определенную выгоду."
 qin_navy_event.3.b:0 "И какая выгода нам с этого?"

 qin_navy_event.4.t:0 "[BYZ.GetName] отказывается принимать делегацию"
 qin_navy_event.4.d:0 "      Настоящим уведомляем, что по тщательном рассмотрении Вашего предложения о направлении делегации для ознакомления с судостроительными технологиями, сие прошение не может быть удовлетворено. При сложившихся обстоятельствах подобная форма сотрудничества не соответствует нашим представлениям о взаимной выгоде.\n\n      Решение сие продиктовано соображениями государственной пользы, ибо передача технологий военного кораблестроения не представляется нам целесообразной в нынешних условиях. При сем сохраняем готовность к развитию торговых сношений и иных форм взаимодействия, более соответствующих интересам обеих держав."
 qin_navy_event.4.a:0 "Печально."

 qin_navy_event.5.t:0 "Ромея поддерживает инициативу технологического сотрудничества"
 qin_navy_event.5.d:0 "      Принимаем с величайшим удовлетворением поступившее предложение о направлении делегации для ознакомления с судостроительными технологиями нашей державы. Мы усматриваем в сем начинании проявление взаимного доверия и укрепление многовековых уз, связывающих наши народы через Великий шёлковый путь, что соответствует интересам обеих сторон.\n\n      Сообщаем, что уже начали необходимые приготовления к достойному приёму делегации и организации программы пребывания. Наши специалисты готовы продемонстрировать передовые достижения в области кораблестроения, что, несомненно, послужит основой для плодотворного сотрудничества и взаимного процветания на долгие годы."
 qin_navy_event.5.a:0 "Отлично!"

 qin_navy_event.6.t:0 "Прибытие делегации из Китая"
 qin_navy_event.6.d:0 "      Делегация из Империи Цин благополучно прибыла в Константинополь и была размещена в гостинице, где для них подготовлены все необходимые условия для комфортного пребывания. Члены делегации выразили удовлетворение оказанным приёмом и готовы приступить к ознакомлению с судостроительными технологиями нашей империи после необходимого отдыха с дороги.\n\n      В связи с началом визита целесообразно рассмотреть вопрос о возможных направлениях технологического сотрудничества. Одним из перспективных вариантов представляется предложение помощи в организации судостроительного производства: передача знаний по созданию современных верфей, оснащенных передовым оборудованием, что позволит китайской стороне наладить собственное строительство судов различного класса под нашим техническим руководством.\n\n      Также следует предложить китайской стороне возможность заказа уже построенных на наших верфях судов устаревших моделей, снятых с вооружения. Это позволит обеспечить дополнительную загрузку ромейских судостроительных предприятий, одновременно удовлетворив первоочередные потребности китайского флота. В перспективе возможна организация сборочного производства на китайской территории из поставляемых нами комплектующих, что сохранит технологический контроль и создаст основу для дальнейшего сотрудничества.\n\n      Наконец, возможен ограниченный обмен технологиями в области судового машиностроения - передача документации на паровые двигатели устаревших моделей, не представляющих стратегической ценности, но способных удовлетворить текущие потребности китайского флота. Это создаст основу для будущего сотрудничества в более значимых областях."
 qin_navy_event.6.a:0 "Стоит поделится с ними чертежами."
 qin_navy_event.6.b:0 "Мы окажем им содействие в строительстве верфей."
 qin_navy_event.6.c:0 "Лицензируем производство судов."


 qin_navy_event.10.t:0 "Подготовка к отправке делегации в Конфедерацию"
 qin_navy_event.10.d:0 "      Конфедерация, несмотря участие в Чайной войне в качестве противника, в настоящее время придерживается нейтральной позиции и относительно готова к установлению деловых отношений. Анализ международной обстановки позволяет считать эту страну потенциально открытой для диалога по вопросам военно-морского сотрудничества. Однако при планировании переговоров следует учитывать сложное экономическое положение государства, которое может существенно ограничить его возможности в реализации совместных проектов.\n\n      В связи с этим предлагается направить официальное предложение о развитии двустороннего сотрудничества в судостроительной отрасли, уделив особое внимание взаимной выгоде такого партнерства. Предварительные консультации рекомендуется провести через дипломатические каналы с последующей организацией визита делегации в Лондон для обсуждения конкретных направлений взаимодействия, включая возможную закупку лицензий и получение технологической помощи."
 qin_navy_event.10.a:0 "Направьте официальный запрос через посольство."

 qin_navy_event.11.t:0 "[QIN.GetName] просит о технологическом содействии"
 qin_navy_event.11.d:0 "      Правительство Империи Цин направило официальный запрос о технологической помощи в развитии военно-морского флота. Китайская сторона подчеркивает стратегический характер предлагаемого сотрудничества, выражая готовность к значительным финансовым инвестициям в обмен на современные кораблестроительные технологии и подготовку инженерных кадров. Данное предложение требует комплексной оценки с учетом текущей экономической ситуации.\n\n      Согласие на сотрудничество может принести существенные финансовые поступления и укрепить дипломатические позиции. Однако необходимо учитывать долгосрочные последствия передачи передовых технологий, способных повлиять на региональный баланс сил и создать стратегические риски для национальных интересов.\n\n      Отказ сохранит технологическое превосходство, но приведет к потере значительных финансовых возможностей и может негативно отразиться на двусторонних отношениях. Альтернативой может стать предложение ограниченного сотрудничества в гражданском судостроении при сохранении военных технологий."
 qin_navy_event.11.a:0 "Мы сможем получить определенную выгоду."
 qin_navy_event.11.b:0 "И какая выгода нам с этого?"

 qin_navy_event.12.t:0 "[CBI.GetName] отказывается принимать делегацию"
 qin_navy_event.12.d:0 "      С должным вниманием рассмотрев Ваше предложение о направлении делегации для изучения судостроительных технологий, мы с прискорбием вынуждены отказать в сем предприятии. Тяжёлое экономическое положение, в коем ныне пребывает наша держава, не позволяет осуществить столь масштабные проекты.\n\n      Продолжающийся экономический кризис и истощение казны вынуждают нас откладывать все международные инициативы, требующие значительных расходов. При сем заявляем о сохранении добрых намерений в отношении вас и надеемся, что в будущем, по улучшении обстоятельств, мы сможем возобновить переговоры о сотрудничестве в кораблестроительном деле."
 qin_navy_event.12.a:0 "Печально."

 qin_navy_event.13.t:0 "Конфедерация поддерживает инициативу технологического сотрудничества"
 qin_navy_event.13.d:0 "      С глубоким удовлетворением восприняли мы предложение о направлении делегации для ознакомления с судостроительными технологиями нашей державы. Видим в сем начинании залог укрепления взаимопонимания между нашими народами и развития отношений, основанных на взаимном уважении и общности интересов.\n\n      Сообщаем, что уже приступили к необходимым приготовлениям для надлежащего приёма делегации и составления обширной программы пребывания. Наши лучшие специалисты готовы поделиться передовыми наработками в области кораблестроения, что, уверены, послужит основой для долгосрочного и плодотворного сотрудничества между нашими державами."
 qin_navy_event.13.a:0 "Отлично!"

 qin_navy_event.14.t:0 "Прибытие делегации из Китая"
 qin_navy_event.14.d:0 "      Делегация из Китая благополучно прибыла в Лондон и была размещена в гостинице, где для них созданы все необходимые условия для комфортного пребывания. Члены делегации выразили признательность за оказанный приём и готовы приступить к обсуждению вопросов судостроительного сотрудничества после непродолжительного отдыха с дороги, что свидетельствует об их заинтересованности в установлении прочных партнёрских отношений.\n\n      Учитывая сложное экономическое положение Конфедерации, мы должны предложить варианты сотрудничества, не требующие значительных финансовых вложений с нашей стороны. Наиболее реалистичным представляется предложение о закупке китайской стороной готовых судов устаревших моделей, что позволит обеспечить загрузку наших верфей и принесет доход в казну без дополнительных затрат.\n\n      Вторым направлением может стать ограниченная помощь в создании собственных верфей в Китае, осуществляемая силами китайских специалистов под нашим консультационным руководством. Такой подход минимизирует расходы Конфедерации, сохраняя при этом возможность влияния на развитие судостроительной отрасли в Китае и получение определенных экономических выгод.\n\n      Третье предложение должно касаться передачи технологий через продажу чертежей и документации на снятые с производства корабли. Эта мера не потребует существенных расходов, но принесет дополнительный доход, а также создаст основу для будущего расширения сотрудничества, когда экономическое положение Конфедерации улучшится."
 qin_navy_event.14.a:0 "Стоит поделится с ними чертежами."
 qin_navy_event.14.b:0 "Мы окажем им содействие в строительстве верфей."
 qin_navy_event.14.c:0 "Лицензируем производство судов."

 qin_navy_event.15.t:0 "Отчет о визите промышленной комиссии в Конфедерацию"
 qin_navy_event.15.d:0 "      По итогам переговоров между делегацией Империи Цин и правительством Конфедерации достигнута договоренность о передаче ряда судостроительных технологий и чертежей. Несмотря на сложное экономическое положение страны, британская сторона согласилась предоставить документацию на устаревшие модели военных кораблей, а также технологии судового машиностроения, не представляющие стратегической ценности, но способные удовлетворить текущие потребности китайского флота.\n\n      В рамках программы пребывания делегация посетила Государственные Верфи в Лондоне, где ознакомилась с организацией современного судостроительного производства. Также состоялись визиты на верфи в Портсмуте, специализирующиеся на строительстве военных кораблей, и арсенал в Вулвиче, где продемонстрированы новейшие разработки в области корабельной артиллерии и системы бронезащиты судов.\n\n      По итогам визита достигнуты договоренности о технологическом содействии, включая передачу конструкторской документации на несколько моделей кораблей различного класса и технических спецификаций на судовые силовые установки. Полученные материалы охватывают проверенные временем проекты, хорошо зарекомендовавшие себя в эксплуатации и представляющие практический интерес для развития судостроительной отрасли. Это создает основу для дальнейшего сотрудничества и позволяет приступить к планомерной модернизации флота с использованием переданных технических решений и технологических наработок."
 qin_navy_event.15.a:0 "Неплохой результат."

 qin_navy_event.16.t:0 "Отчет о визите промышленной комиссии в Конфедерацию"
 qin_navy_event.16.d:0 "      По итогам переговоров между делегацией Империи Цин и правительством Конфедерации достигнута договоренность об оказании промышленного содействия в области судостроения. Британская сторона выразила готовность передать технологии организации и строительства современных судостроительных верфей, включая проекты производственных комплексов и методы организации труда, что должно заложить основу для развития собственной судостроительной промышленности Китая.\n\n      В рамках программы пребывания делегация посетила Государственные Верфи в Лондоне, где ознакомилась с принципами организации современного судостроительного производства. Также состоялись визиты на верфи в Портсмуте, демонстрирующие полный цикл строительства военных кораблей, и арсенал в Вулвиче, где были показаны передовые подходы к организации производственных процессов в области корабельной артиллерии и броневого производства.\n\n      По итогам визита достигнуты конкретные договоренности о промышленном содействии, включая передачу полного комплекта документации для создания судостроительных предприятий и организации производственных циклов. Полученные материалы содержат проверенные временем решения в области промышленного строительства и организации производства, что создает основу для развития собственной судостроительной отрасли и позволяет приступить к созданию современных производственных мощностей в Китае."
 qin_navy_event.16.a:0 "Неплохой результат."

 qin_navy_event.17.t:0 "Отчет о визите промышленной комиссии в Конфедерацию"
 qin_navy_event.17.d:0 "      По итогам переговоров между делегацией Империи Цин и правительством Конфедерации достигнута договоренность о размещении заказов на строительство военных кораблей на верфях Лондона и Портсмута. Британская сторона предложила организовать производство сторожевых кораблей и канонерских лодок, специально спроектированных для нужд китайского флота, с использованием современных технологий судостроения, доступных на предприятиях Конфедерации.\n\n      В рамках программы пребывания делегация посетила Государственные Верфи в Лондоне, где ознакомилась с полным циклом строительства кораблей - от проектирования до спуска на воду. Также состоялись визиты на специализированные верфи в Портсмуте, демонстрирующие организацию параллельной сборки нескольких судов, и консультации в Вулвиче по вопросам оснащения кораблей артиллерийскими системами и навигационным оборудованием.\n\n      По итогам визита достигнуты конкретные договоренности о строительстве первых шести боевых единиц на верфях Конфедерации с возможностью последующего расширения сотрудничества. Производство будет осуществляться в соответствии с техническими требованиями китайской стороны, что позволит получить корабли, оптимально подходящие для условий службы в территориальных водах Империи Цин и отвечающие современным стандартам судостроения."
 qin_navy_event.17.a:0 "Неплохой результат."

 qin_navy_event.18.t:0 "Подготовка к отправке делегации в Японию"
 qin_navy_event.18.d:0 "      Япония, демонстрирующая значительные успехи в развитии военно-морского флота, рассматривается как потенциальный партнер для ограниченного технического сотрудничества, однако сохраняет статус стратегического конкурента в регионе. Существующая геополитическая напряженность и исторические противоречия создают существенные риски для реализации любых совместных проектов. Высока вероятность, что японская сторона откажет в предоставлении доступа к передовым технологиям или выдвинет неприемлемые условия сотрудничества.\n\n      В данной ситуации предлагается направить осторожное предложение об ограниченном обмене опытом в области судостроения, исключающее передачу критических технологий. Все переговоры должны проводиться с позиции взаимной выгоды, но с учетом возможных ограничений со стороны японского правительства. Особое внимание следует уделить гарантиям защиты государственных интересов при реализации любых совместных инициатив."
 qin_navy_event.18.a:0 "Направьте предложение о сотрудничестве."

 qin_navy_event.19.t:0 "[QIN.GetName] просит о технологическом содействии"
 qin_navy_event.19.d:0 "      Империя Цин обратилась с официальным запросом о предоставлении доступа к современным судостроительным технологиям и помощи в модернизации военно-морского флота. Китайская сторона выражает заинтересованность в изучении наших методов кораблестроения, организации верфей и обучения технических специалистов. Данное обращение требует особого рассмотрения в свете региональной конкуренции.\n\n      При положительном рассмотрении данного предложения мы могли бы получить значительные экономические преимущества через механизмы технологического трансфера и совместных проектов. Однако необходимо тщательно проанализировать долгосрочные последствия такого решения, поскольку усиление военно-морского потенциала Китая может существенно изменить существующий баланс сил в регионе и повлиять на наши стратегические позиции.\n\n      Отклонение запроса, хотя и позволит сохранить текущее технологическое превосходство, неизбежно приведет к определенному охлаждению двусторонних отношений. Такой шаг может быть воспринят как проявление недоверия и создать дополнительные препятствия для реализации других совместных проектов в будущем, что требует взвешенной оценки всех потенциальных дипломатических последствий."
 qin_navy_event.19.a:0 "Мы сможем получить определенную выгоду."
 qin_navy_event.19.b:0 "И какая выгода нам с этого?"

 qin_navy_event.20.t:0 "[JAP.GetName] отказывается принимать делегацию"
 qin_navy_event.20.d:0 "      По Высочайшему повелению Его Императорского Величества, сообщаем, что ходатайство о допуске китайской делегации для ознакомления с современными кораблестроительными технологиями, методами организации военно-морского дела и судостроительными производствами подлежит окончательному и безусловному отклонению. Наше решение является окончательным и пересмотру не подлежит, о чём и сообщается для надлежащего исполнения.\n\n      Сей отказ продиктован насущной необходимостью сохранения государственных тайн и военно-морских секретов Империи в условиях сложившейся международной обстановки. В соответствии с императорскими указами о защите стратегических интересов, передача передовых технологий судостроения и военного кораблестроения признана совершенно недопустимой. О вышеизложенном извещаем Ваше правительство для надлежащего сведения и принятия к исполнению."
 qin_navy_event.20.a:0 "Печально."

 qin_navy_event.21.t:0 "Япония поддерживает инициативу технологического сотрудничества"
 qin_navy_event.21.d:0 "      Рассмотрев Ваше предложение о направлении делегации для ознакомления с судостроительными технологиями, мы готовы принять Ваших специалистов. Хотя наши державы сохраняют различные взгляды на региональные вопросы, мы признаём потенциальную пользу от технического сотрудничества.\n\n      Мы организуем программу пребывания, соответствующую целям Вашей делегации. Наши инженеры продемонстрируют отдельные аспекты кораблестроения в рамках взаимовыгодного обмена, что может послужить основой для более конструктивных отношений между нашими странами в будущем."
 qin_navy_event.21.a:0 "Отлично!"

 qin_navy_event.22.t:0 "Прибытие делегации из Китая"
 qin_navy_event.22.d:0 "      Китайская делегация прибыла в Японию и размещена в гостинице, где созданы все необходимые условия. Несмотря на существующие политические разногласия, члены делегации проявляют сдержанную готовность к диалогу, что позволяет надеяться на возможность ограниченного сотрудничества в судостроительной сфере при сохранении конкурентных отношений между нашими странами.\n\n      В качестве первого направления предлагается продажа устаревших моделей военных кораблей. Это позволит укрепить экономическое влияние Японии в регионе, создав определенную зависимость китайского флота от наших поставок и технологий, что соответствует долгосрочным стратегическим интересам нашей империи в условиях текущей региональной конкуренции.\n\n      Вторым вариантом может стать ограниченное консультационное сопровождение строительства китайских верфей. Подобное сотрудничество должно быть организовано таким образом, чтобы сохранить технологическое превосходство Японии, одновременно обеспечивая контроль над развитием судостроительной отрасли Китая и создавая устойчивые экономические связи.\n\n      Третье предложение включает передачу устаревших технологий и чертежей списанных кораблей. Эта мера позволит укрепить экономическое влияние Японии, создав технологическую зависимость китайского судостроения, что соответствует нашим стратегическим интересам в регионе и позволит сохранить рычаги давления на Китай в будущем."
 qin_navy_event.22.a:0 "Стоит поделится с ними чертежами."
 qin_navy_event.22.b:0 "Мы окажем им содействие в строительстве верфей."
 qin_navy_event.22.c:0 "Лицензируем производство судов."

 qin_great_embassy_event.1.t:0 "Начало «Великого посольства»"
 qin_great_embassy_event.1.d:0 "      Сейчас Поднебесная всё острее ощущает промышленное и военное отставание от западных держав и стремительно вестернизируемой Японии. Чтобы устранить этот разрыв и устранить проблему промышленного отставания, было решено сформировать и направить в вестернизированные страны группу специалистов  и дипломатов для изучения опыта варваров. Из-за масштабности миссии, среди ее участников и инициаторов она получила назввание - «Великое посольство».\n\n      Во главе посольства стоит опытный дипломат Линь Цзэсюй. В его составе находятся Вэй Юань, Ци Шань, Го Сунтао, инженер-практик Чжан Синь и многие другие чиновники, учёные, инженеры и переводчики. Каждый член делегации отвечает за свою сферу: от наблюдения за производственными процессами до изучения систем образования и военной организации.\n\n      Основная цель миссии заключается в том, чтобы тщательно осмотреть и описать устройство фабрик, верфей, железных дорог, арсеналов и учебных заведений в Конфедерации, Франции, Германии, России, Ромейской Империи и Японии. Правительствам стран уже были направлены официальные прошения о приёме посольства и оказании содействия в ознакомлении с их промышленными и техническими достижениями.\n\n      По возвращении участники миссии представят подробные отчёты и практические предложения. На их основе предполагается незамедлительно приступить к созданию современной промышленной базы Китая: строительству собственных заводов и мастерских, налаживанию производства машин и паровых двигателей, перестройке системы подготовки инженеров и рабочих. При этом сохраняются политическая устойчивость государства и культурная самобытность Поднебесной, избегая бездумного подражания чужеземным обычаям."
 qin_great_embassy_event.1.a:0 "Это начало долгого пути."

 qin_great_embassy_event.2.t:0 "Прошение о приеме «Великого посольства»"
 qin_great_embassy_event.2.d:0 "Его Превосходительству Лорду-Протектору Конфедерации Британских островов\n\n      От имени Его Величества Императора Поднебесной и по поручению Великого Совета империи с глубочайшим уважением обращаемся к Вашему Величеству с официальной просьбой о приёме и всестороннем содействии «Великому посольству Империи Цин». Данная высокопоставленная миссия, состоящая из опытных дипломатов, чиновников, учёных и инженеров, направляется в Вашу страну с единственной целью — подробного и систематического ознакомления с передовыми промышленными предприятиями, технологическими процессами и организацией производства в Конфедерации. Мы глубоко заинтересованы в изучении современных фабрик, механизированных мастерских, судостроительных и машиностроительных заводов, а также методов применения паровых машин, металлургии и других достижений промышленности, которые обеспечивают быстрое развитие Вашей страны.\n\n      Просим Ваше Превосходительство милостиво разрешить членам посольства посещение промышленных объектов, предоставить возможность наблюдать за производственными процессами, ознакомиться с оборудованием и принципами организации труда, а также оказать необходимое содействие в сборе технических сведений и материалов. Правительство Поднебесной убеждено, что такой обмен знаниями послужит укреплению взаимного уважения и развитию дружественных связей между нашими государствами. Заранее выражаем искреннюю признательность за благосклонное рассмотрение нашей просьбы и надеемся на скорейшее положительное решение."
 qin_great_embassy_event.2.a:0 "Мы можем извлечь из этого пользу, но нужно сохранять осторожность."
 qin_great_embassy_event.2.b:0 "Пустить китайцев на наши производства? Что за бред..."

