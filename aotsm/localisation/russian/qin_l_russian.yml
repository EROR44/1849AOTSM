 #COUNTRY_LEADER

 QIN_Aisin_Gioro_Mianning_t:0 "Айсинь Гьоро Мяньнин"
 POLITICS_AISIN_GIORO_MIANNING_DESC:0 "Полное имя: §YАйсинь Гьоро Мяньнин§!\nДата рождения: §G16§! сентября §G1782§! года\nМесто рождения: Запретный город, Пекин, Империя Цин\n\nБудучи вторым сыном императора §YЦзяцина§! и наложницы из клана Лю, §YМяньнин§! получил конфуцианское образование, включавшее философию, каллиграфию и военные дисциплины. Его дисциплинированность и рассудительность сделали его предпочтительным кандидатом на трон, и в §G1820§! году, после смерти отца, он взошёл на престол под девизом «§YДаогуан§!» («§YСветлый путь§!»).\n\nПравление §YДаогуана§! совпало с усилением европейской экспансии, угрожавшей торговым связям §YЦин§! с §YРомейской Империей§!. Для защиты экономики он поддерживал систему, ограничивавшую торговлю портом §YГуанчжоу§! и предоставлявшую монополию китайским купцам. Однако рост чайного производства на §YЦейлоне§! и в §YИндии§! европейскими компаниями, особенно Британской и Голландской Ост-Индскими, вызвал отток серебра. §YДаогуан§! поручил §YЛинь Цзэсюю§! ограничить чайную торговлю, разрешив её только §YРомейской Индийской Торговой компании§!, что спровоцировало конфликт.\n\nВ §G1840§! году началась §YЧайная война§!, вызванная конфискацией §YЛинь Цзэсюем§! партий чая для §YНидерландов§!. Флот §YИмперии Цин§! состоявший из деревянных джонок и слабовооружённые войска не смогли противостоять современным европейским силам. Поражение в конфликле в §Y1842 году было закреплено §YНанкинским договором, открывшим пять портов - §YГуанчжоу, §YСямэнь, §YФучжоу, §YНинбо и §YШанхай - для европейской торговли. А также Цин передала §YГонконг§! голландцам и была вынцждена выплачивать репарации. Этот договор обнажил слабости империи и вызвал народные волнения.\n\n§YПервая китайско-японская война§! (§G1843§!–§G1845§!) стала новым ударом. §YЯпония§!, стремившаяся к влиянию в §YКорее§!, захватила два китайских порта, включая §YЛюйшунь§!. Ослабленная армия Цин потерпела поражение, вынудив §YДаогуана§! заключить мир в §G1845§! году. Попытки реформ, включая «§YСто дней реформ§!» §G1848§! года, провалились из-за сопротивления чиновников. §YДаогуан§! стремился укрепить империю, но внешние угрозы и внутренние противоречия осложняли его правление."
 QIN_Aisin_Gioro_Ichu_t:0 "Айсинь Гьоро Ичжу"
 POLITICS_AISIN_GIORO_ICHU_DESC:0 "Полное имя: Айсинь Гьоро Ичжу\nДата рождения: 17 июля 1831 годаМесто рождения: Запретный город, Пекин, Империя Цин\n\nАйсинь Гиоро Ичжу, ныне правящий император Сяньфэн, четвёртый сын императора Даогуана, взошёл на трон в сложный для империи Цин период. Получив строгое конфуцианское образование с акцентом на философию, литературу и государственное управление, он демонстрирует острый ум и интерес к военным делам. Однако многие при дворе и среди элит считают его неудачным правителем, указывая на неспособность переломить упадок империи. "
