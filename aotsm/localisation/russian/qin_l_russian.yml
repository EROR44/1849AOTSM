 QIN_improve_relations_between_fractions_tt:0 "Произойдет один из вариантов.\n\nС вероятностью §Y75%§!:\n§YЛояльность§! каждой фракции будет §Gувеличена§! на §G3%§!\n§YВлияние§! каждой фракции будет §Gснижено§! на §G1%§!\n\nС вероятностью §Y20%§!:\n§YЛояльность§! каждой фракции будет §Gувеличена§! на §G5%§!\n§YВлияние§! каждой фракции будет §Gснижено§! на §G3%§!\n\nС вероятностью §Y5%§!:\n§YЛояльность§! каждой фракции будет §Gувеличена§! на §G5%§!\n§YВлияние§! каждой фракции будет §Gснижено§! на §G5%§!"

