 qin_taypin_chain_event.1.t:0 "История Хун Суцюаня"
 qin_taypin_chain_event.1.d:0 "      В скромном селении Фусянь уезда Гуаньчжоу появляется на свет Хун Сюцуань, сын рода хакка, горцев, кои, скитаясь по южным провинциям, хранят древние обычаи и упорство предков. Семья его, погруженная в нищету, едва сводит концы с концами: отец, пахарь, изнуренный полевыми трудами, и мать, прилежная пряхиня, питают надежды на сына, дабы он возвысил род из праха. Хун, отрок одаренный и ревностный к грамоте, с младых ногтей преклоняется пред свитками конфуцианских канонов, мечтая о чиновничьей мантии. Нищета, яко тень неумолимая, следует за ним повсюду, лишая всяческих излишеств, и семья, в поте чела своего, кормит его, жертвуя последними крохами риса.\n\n      В возрасте восемнадцати лет Хун впервые отправляется на экзамен в Гуаньчжоу, дабы пройти испытание на чиновничью должность в империи. Семья, в трепете и уповании, собирает ему в дорогу скудные пожитки: продают древний свиток предков и медный амулет, дабы сын мог ступить на стезю возвышения. Путь долог и тернист, Хун шагает версты пешком, питаясь лишь воспоминаниями о материнских сказаниях о добродетели и долге. В чертогах экзаменационных, украшенных драконами и фениксами, где вершится суд над судьбами юношей, он встречает слугу, что из сострадания вручает ему протестантский трактат под заглавием «Добрый совет для спасения душ». Сие сочинение, напечатанное на смеси китайского и варварских письмен, повествует о Небесном Господе и Его Сыне, кои якобы искупают грехи людские.\n\n      Перечитывая оный трактат в сумерках, Хун, чей ум пленен конфуцианскими догмами, зрит в нем лишь хаос иносказаний. Имена Иисуса и Бога кажутся ему странными призраками, а притчи – бессвязным бредом иноземных колдунов, стремящихся совратить сынов Поднебесной. Ни единой искры просветления не зажигается в душе его; напротив, в раздражении он отбрасывает листницы, решив, что сие суть вымыслы, недостойные внимания. Так, с трактатом, забытым в торбе, возвращается он в родное селение, где нищета и первый провал экзамена омрачают его чаяния. Семья, узрев сына опечаленным, утешает его словами о терпении, но в сердце Хуна зреет горечь, ибо сие поражение предвещает долгие годы скитаний в безвестности."
 qin_taypin_chain_event.1.a:0 "Что ждет его дальше?"

 qin_taypin_chain_event.2.t:0 "История Хун Суцюаня"
 qin_taypin_chain_event.2.d:0 "      Спустя год, в девятнадцать лет, Хун вновь собирается в Гуаньчжоу, дабы бросить вызов судьбе и попытаться сдать экзамен во второй раз. Нищета семьи усугубляется: отец хворает от истощения, мать в заботах о младших чадах едва утишает голод, а сестры, дабы собрать подаяние, молят милостыню у проезжих купцов. Хун, сжигаемый жаждой успеха, ночи напролет зубрит «Четыре Книги» и «Пять Канонов», перелистывая страницы при свете масляной лампады. В экзаменационных чертогах он предстает пред строгими взорами судей, в мантиях пурпурных, кои вопрошают о тонкостях конфуцианских учений. Однако экзаменаторы, предубежденные к сынам простолюдинов, отвергают его сочинения, объявив их недостойными.\n\n      Поражение, яко нож острый, ранит сердце Хуна, и он, в молчаливом горе, возвращается в хижину, где тени нищеты сгущаются еще плотнее. Семья, взирая на него с состраданием, делит последнюю краюху, но дух его мятется, ибо в сем провале он зрит пороки империи, где богатство и связи вершат судьбы, а добродетель попирается. Не сломленный доселе, в двадцать три года Хун предпринимает третью попытку, возлагая на нее последние надежды рода. Отец, на смертном одре, благословляет сына последним вздохом, а мать и сестры, в лишениях, собирают серебро, продавая последние реликвии.\n\n      В экзаменационных залах Хун сражается пером своим против теней сомнений, но судьи, в своей жестокости, вновь заклеймляют его труд «варварским лепетом», лишив всякой надежды на чиновничью стезю. Сей третий провал сокрушает его телесно и душевно: он, в припадках ярости, рвет на себе одежды и взывает к духам предков, но тщетно. Горечь его нестерпима; лихорадка, яко демон, вползает в кости его, и он падает на ложе в бреду, где тени прошлого смешиваются с видениями грядущего. Поражения, яко цепи железные, сковывают его дух, и он, вопрошая о смысле страданий, начинает сомневаться в устоях конфуцианских, зрея семена мятежа против империи."
 qin_taypin_chain_event.2.a:0 "К чему приведут его сомнения?"

 qin_taypin_chain_event.3.t:0 "История Хун Суцюаня"
 qin_taypin_chain_event.3.d:0 "      В двадцать три года, после третьего провала, Хун впадает в тяжкий бред, терзаемый нервным истощением. Лихорадка овладевает им внезапно: тело его пылает, яко в пламени адском, пот льется рекой, а разум мутнеет, словно в тумане осеннем. Три дня и три ночи мечется он на убогом ложе в хижине, бормоча заклинания конфуцианские и взывая к небесам в бессвязных речах. Дыхание его прерывисто, конечности дрожат в конвульсиях, а очи, полные ужаса, блуждают во тьме. Семья, в страхе, прикладывает холодные компрессы и шепчет молитвы, но демон лихорадки не отступает, погружая Хуна в бездну видений, где реальность смешивается с призраками.\n\n      В сем трансе является ему сон, дивный и устрашительный, коего никогда не изведывал доселе. Предстают два мужа бородатых, в одеждах ослепительной белизны, парящие над облаками, словно духи небесные. Один, величественный и грозный, с венцом на челе, провозглашает себя Отцом Небесным, дарующим закон и справедливость; он, в речах громоподобных, обличает идолопоклонство Поднебесной и тиранию мандаринов, кои суть воры душ. Другой, младший и кроткий, с ранами на челе и ладонях, именует себя Сыном Его, Искупителем, терзаемым слугами демонов; он, с состраданием, повествует о жертве своей за грехи людские и призывает Хуна к борьбе с бесами конфуцианскими. Они ведут его чрез сады Эдема, где реки меда и молока текут меж лилий нетленных, и показывают твердыню сияющую, где праведники пируют вечно; там, в сиянии божественном, провозглашают Хуна избранным братом Сыну, дабы он повел народ от тирании Цин и восстановил истинный закон Небесный, искоренив всякое зло.\n\n      Пробудившись по истечении трех суток, Хун, с телом окрепшим внезапно и духом воспрянувшим, извлекает из пыли забытый трактат. Перечитывая его ныне, с рукою дрожащею, он прозревает: притчи о Боге Отце и Сыне Его сливаются с видением сна, и вся премудрость христианская, доселе темная, является ему ясною, яко день полдневный. Имена Иисуса и Иеговы эхом отзываются в сердце его, и он, в экстазе духовном, падает ниц, провозглашая себя «Вторым Сыном Небесным», посланным сокрушить идолов и бесов. Семья, взирая на него, полна смятения и трепета, ибо в речах его звучит пламя, а в очах мерцает свет неведомый, сулящий перемены, коих смысл пока сокрыт в тенях грядущего."
 qin_taypin_chain_event.3.a:0 "Интересно"
 
 qin_taypin_chain_event.4.t:0 "Секта поклонения Богу"
 qin_taypin_chain_event.4.d:0 "      В южных провинциях Поднебесной империи, среди бедных слоев населения, широко распространяется движение, именуемое «Секта поклонения Богу», основанное Хун Сюцуанем, выходцем из рода хакка. Основатель провозглашает себя «Вторым Сыном Небесным» и утверждает, что учение секты возрождает древнюю религию Шанди, единого Небесного Бога, отвергая конфуцианские и буддийские каноны как идолопоклонство. Движение привлекает крестьян, ремесленников и обездоленных, изнуренных нищетой и гнетом властей, обещая равенство и божественное покровительство. Проповеди, исполненные призывов к новой вере, находят отклик в сердцах тех, кто жаждет избавления от житейских тягот.\n\n      Учение секты, как утверждают знакомые с ее трактатами, представляет собой причудливую смесь протестантских идей, заимствованных из иноземных миссионерских текстов, и элементов буддизма, переосмысленных в духе местных традиций. Верующие придерживаются строгой морали, запрещающей азартные игры, опиум и многоженство, и живут в общинах, где имущество распределяется поровну. Секта устанавливает четкую иерархию: Хун Сюцуань, почитаемый как божественный посланник, руководит движением, а его сподвижники, носящие титулы «царей», управляют общинами, поддерживая духовную и нравственную дисциплину среди последователей.\n\n      Секта обретает влияние преимущественно в провинции Гуанси, но ее идеи постепенно проникают в соседние регионы, включая Гуандун и Хунань, где собираются толпы сторонников. Общины, объединенные верой в Небесное царство, возникают в селениях и малых городах, привлекая тех, кто ищет утешения в учении о справедливости и божественном порядке. Проповеди, звучащие на рыночных площадях и в хижинах, собирают слушателей, готовых внимать словам о новом пути, что рождает надежду среди простого народа."
 qin_taypin_chain_event.4.a:0 "Возможно они угроза легитимной власти..."

 qin_taypin_chain_event.5.t:0 "Секта, пленяющая сердца"
 qin_taypin_chain_event.5.d:0 "      В южных провинциях Поднебесной империи «Секта поклонения Богу» стремительно набирает силу, притягивая людей, измученных нищетой и несправедливостью. Ее проповеди, полные надежды на духовное возрождение, звучат на деревенских площадях и в убогих хижинах, трогая сердца крестьян и ремесленников. Слова о божественном порядке, сулящем избавление от тягот, словно искры, разжигают в людях веру в лучшее будущее. Секта распространяется, подобно ветру, несущему перемены, и ее влияние охватывает все новые селения, где число последователей растет с каждым днем.\n\n      Чиновники империи с тревогой наблюдают за ростом движения, ведь его идеи бросают вызов устоявшемуся порядку династии Цин. Учение секты, сплетая иноземные христианские воззрения с местными верованиями, кажется многим странным и непривычным. Последователи, живущие в общинах и придерживающиеся строгих нравственных правил, отвергают старые обряды, вызывая споры среди тех, кто следит за их действиями. Обещание равенства манит обездоленных, и это усиливает притягательность секты, чьи слова находят отклик в душах тех, кто устал от гнета.\n\n      Секта укореняется в провинциях Гуанси, Гуандун и Хунань, где ее общины появляются в деревнях и малых городах. Проповедники, выступающие на рынках и в домах, собирают толпы, жаждущие услышать о новом пути. Рост числа приверженцев заставляет задуматься о том, как движение изменит южные земли. Сейчас мы стоим перед выбором: начать диалог с сектантами, чтобы понять их стремления, или противостоять их влиянию, защищая привычный порядок."
 qin_taypin_chain_event.5.a:0 "Настало время решительных действий!"
 qin_taypin_chain_event.5.b:0 "Слухи явно преувеличены..."

 qin_viceroys_and_guvernors_chain_event.1.t:0 "Указ Его Императорского Величества о назначении наместника Чжили"
 qin_viceroys_and_guvernors_chain_event.1.d:0 "      Небо ниспослало Маньчжурской династии великий мандат на управление Поднебесной. Мы, император Великой Цин, внимая воле Неба и следуя заветам предков, даруем сей указ. Усмирение границ, искоренение разбоя и благоденствие народа суть главные заботы Престола. Принимая во внимание верную службу и испытанную добродетель Гильяна, который ранее являл усердие на благо Отечества, Мы не сомневаемся в его преданности. Посему, превыше всяких сомнений и споров, Мы назначаем Гильяна на пост вице-короля Чжили, жалуя полный титул и серебряную печать для управления вверенными землями.\n\n      Назначенному наместнику повелевается: немедля по получении сего указа прибыть в Баодин и приступить к делам. Ты будешь ведать всеми военными и гражданскими делами провинции, надзирать за деятельностью чиновников всех рангов, от уездных магистратов до генералов гарнизонов. В твою прямую обязанность входит сбор налогов в полном объёме, содержание ирригационной системы в исправности, а также командование гарнизоном на вверенных землях для подавления любых беспорядков. Ты имеешь право докладывать тронному секретарю напрямую, минуя промежуточные инстанции, но помни: каждое твое решение должно быть взвешенным и во славу династии.\n\n      О сем указе ведать: непослушание приказам наместника карается как нарушение императорской воли. Если же сам наместник пренебрежет службой, допустит рост коррупции или утратит вверенные ему земли — его постигнет высшая мера наказания вплоть до истребления всего рода. Скрижаль Неба и Земли свидетельствует. Да исполнится воля династии Цин. Почтительно служи, и да не посрамишь доверия."
 qin_viceroys_and_guvernors_chain_event.1.a:0 "Утверждаю, [QIN.GetLeader]"

