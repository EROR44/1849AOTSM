 QIN_socialism_party:0 "Общество поклонения Богу"
 QIN_socialism_party_long:0 "Общество поклонения Богу или Бай Шанди хуэй - религиозно-политическая организация, созданная Хун Суцуанем. Одной из главных целей организации является достижение всеобщего равенства, в том числе с помощью отрицания учений Будды и Конфуция."
 
