 QIN_start_the_great_embassy:0 "Начало «Великого посольства»"
 QIN_start_the_great_embassy_desc:0 ""
 QIN_embassy_go_to_confederacy:0 "Посольство едет в Конфедерацию"
 QIN_embassy_go_to_confederacy_desc:0 ""
 QIN_embassy_go_to_prussia:0 "Посольство едет в Пруссию"
 QIN_embassy_go_to_prussia_desc:0 "Изучение прусских военных и промышленных практик укрепит государственный потенциал. Дисциплина и инновации Пруссии предоставят модели для организации армии и производства, позволяя адаптировать их к условиям Империи Цин для повышения мощи и устойчивости."
 QIN_send_delegation_to_france:0 "Направить делегацию во Францию"
 QIN_embassy_go_to_france:0 "Посольство едет в Францию"
 QIN_embassy_go_to_france_desc:0 "Изучение французских достижений в промышленности и администрации ускорит модернизацию. Опыт машиностроения и бюрократических реформ поможет интегрировать западные инновации, сохраняя культурную идентичность Империи Цин в условиях внешнего давления."
 QIN_embassy_go_to_romea:0 "Посольство едет в Ромею"
 QIN_embassy_go_to_romea_desc:0 ""
 QIN_embassy_go_to_russia:0 "Посольство едет в Россию"
 QIN_embassy_go_to_russia_desc:0 ""
 QIN_embassy_go_to_japan:0 "Посольство едет в Японию"
 QIN_embassy_go_to_japan_desc:0 ""
 QIN_end_of_the_great_ebassy:0 "Завершение «Великого посольства»"
 QIN_end_of_the_great_ebassy_desc:0 ""
 QIN_step_towards_westernisation:0 "Сделать шаг навстречу вестернизации"
 QIN_step_towards_westernisation_desc:0 ""
 QIN_define_modernization_strategy:0 "Определить стратегию модернизации"
 QIN_define_modernization_strategy_desc:0 "Разработка плана модернизации требует сочетания традиций с западными технологиями. Выбор подхода определит развитие экономики, армии и общества, учитывая уроки прошлых реформ и вызовы, связанные с внешними угрозами и внутренними противоречиями."
 QIN_chi_shan_strategy:0 "Стратегия Ци Шаня"
 QIN_chi_shan_strategy_desc:0 "Ускоренная модернизация общества и промышленности через сотрудничество с западными державами. Приоритет отдается быстрому внедрению технологий и реформ, несмотря на риск усиления иностранного влияния и социальных волнений, для укрепления мощи Империи."
 QIN_wei_yuan_strategy:0 "Стратегия Вей Юаня"
 QIN_wei_yuan_strategy_desc:0 "Заимствование иностранных методов для укрепления обороны через военные реформы и технологии. Подход «учиться у варваров, чтобы контролировать варваров» повышает боеспособность Империи Цин, обеспечивая защиту от внешних и внутренних угроз."
 QIN_start_racing_against_time:0 "Начало гонки со временем"
 QIN_start_racing_against_time_desc:0 "Ускоренные реформы необходимы для преодоления технологического отставания. В условиях внешних угроз и внутренних кризисов развитие промышленности и армии становится приоритетом, чтобы обеспечить выживание династии и укрепить государственный суверенитет."
 QIN_cooperation_with_western_concerns:0 "Сотрудничество с западными концернами"
 QIN_cooperation_with_western_concerns_desc:0 "В рамках стратегии Ци Шаня сотрудничество с западными концернами ускоряет индустриализацию через интенсивные инвестиции и технологии. Привлечение иностранных экспертов и капитала обеспечит быстрый рост производства, несмотря на риски увеличения экономической зависимости и усиления иностранного влияния на страну."
 QIN_grievance_control:0 "Борьба с недовольством"
 QIN_grievance_control_desc:0 "Ускоренные реформы, меняющие привычный уклад жизни, вызвали волну недовольства среди простого народа и элиты, усиливая социальное напряжение. Чтобы сохранить единство и продолжить путь к укреплению страны, требуется принять меры для снижения уровня недовольства."
 QIN_start_big_leap:0 "Время начать «Большой скачок»"
 QIN_start_big_leap_desc:0 "Вдохновленные идеей «Большого скачка», реформы Империи Цин устремлены к быстрому прогрессу через строительство фабрик и освоение западных технологий. Народ и ресурсы мобилизуются для рывка вперед, но важно действовать с умом, чтобы не допустить смуты и сохранить равновесие."
 QIN_european_equip_purchase:0 "Закупка европейского оборудования"
 QIN_european_equip_purchase_desc:0 "Приобретение европейских машин и технологий ускорит модернизацию производства. Повышение эффективности отраслей укрепит экономику и военную мощь Империи Цин, отвечая вызовам XIX века."
 QIN_start_new_mass_productions:0 "Начать создание массовых производств"
 QIN_start_new_mass_productions_desc:0 "Рост промышленных амбиций Империи Цин требует расширения производства для удовлетворения внутренних нужд и противостояния иностранной конкуренции. Масштабное создание новых мануфактур укрепляет экономику, но важно направить силы народа с заботой, чтобы избежать недовольства и сохранить гармонию."
 QIN_let_hundred_flowers_blossom:0 "Пусть расцветают сто цветов"
 QIN_let_hundred_flowers_blossom_desc:0 "Программа ускоренной модернизации промышленности Империи Цин начинает приносить первые плоды. Новые идеи мастеров и ученых оживают, укрепляя экономику."
 QIN_industrialization_with_chinese_specific:0 "Индустриализация с китайской спецификой"
 QIN_industrialization_with_chinese_specific_desc:0 "Внедрение западных технологий в промышленность Империи Цин идет рука об руку с сохранением местных традиций. Такой подход обещает устойчивый рост и укрепление экономики, позволяя народу чувствовать себя частью перемен без утраты привычного уклада жизни."
 QIN_adopt_japanese_experience:0 "Перенять японский опыт"
 QIN_adopt_japanese_experience_desc:0 "Сейчас перенять и адаптировать японский опыт модернизации страны становится жизненно необходимо. Промышленная мощь и военные достижения Японии опережают Цин, побуждая использовать их методы. Это укрепит экономику и армию, позволяя Империи противостоять внешним угрозам и внутренним вызовам."
 QIN_embark_gradual_modernization:0 "Приступить к постепенной модернизации государства"
 QIN_embark_gradual_modernization_desc:0 "Поэтапное внедрение реформ в ключевых секторах минимизирует риски. Аккуратный переход к вестернизированному обществу обеспечит развитие без радикальных потрясений, укрепляя Империю."
 QIN_make_step_forward_future:0 "Сделать шаг в будущее"
 QIN_make_step_forward_future_desc:0 "Переход к новому этапу промышленного развития вдохновляет Империю Цин вкладывать в науку и образование. Эти шаги укрепляют экономику, готовя страну к вызовам современности."
 
 QIN_beginning_of_taiping_rebellion:0 "Начало восстания Тайпинов"
 QIN_beginning_of_taiping_rebellion_desc:0 "По всей стране долгое время нарастало крестьянское недовольство. Малоземелье, непомерные налоги и повсеместная коррупция доводили народ до отчаяния. В конечном итоге это привело к началу мятежа Тайпинов, который быстро набирает обороты и угрожает самому существованию государтсва."
 QIN_green_flag_mobilization:0 "Мобилизация сил зеленого стяга"
 QIN_green_flag_mobilization_desc:0 "На местах подразделения «восьмизнаменной армии» не справляются с натиском повстанцев. Необходимо оперативно мобилизовать добровольческие формирвоания армии «зелёного знамени». Эти части, разбросанные по всей стране, должны быть к очагам восстания для подавления мятежа."
 QIN_counteract_taipings:0 "Противодействовать Тайпинам"
 QIN_counteract_taipings_desc:0 "Тайпины захватывают всё новые территории, их армия растёт как снежный ком. Имперские войска несут тяжёлые потери. Необходимо бросить все имеющиеся резервы на борьбу с мятежниками, пока восстание не охватило долину Янцзы и столичные провинции."
 QIN_counteract_nianjuns:0 "Противодействовать няньцзюням"
 QIN_counteract_nianjuns_desc:0 "В провинции Аньхой, к югу от Пекина, вспыхнуло новое восстание - «Восстание няньцзюней». Недовольные крестьяне и обедневшие ремесленники взялись за оружие, угрожая транспортным артериям, связывающим столицу с центральными и южными провинциями. Подавить мятеж необходимо в зародыше, пока он не соединился с выступлениями других повстанческих групп."
 QIN_accept_army_modernization:0 "Принять необходимость модернизации армии"
 QIN_accept_army_modernization_desc:0 "Старые порядки более не работают. Чтобы одолеть Тайпинов и прочих мятежников, нам предстоит коренным образом реорганизовать сухопутные силы. Необходимо провести перевооружение, создать полевую артиллерию, обучить войска современным тактикам и поднять боевой дух личного состава. Только после этих реформ мы сможем рассчитывать на подавление восстаний и спасение династии."
 QIN_second_round_of_conflict:0 "Второй виток конфликта"
 QIN_second_round_of_conflict_desc:0 "Конфликт вступает во вторую фазу. Напряжение охватывает всю империю: недовольство крестьян перерастает в открытые выступления, а провинциальные элиты всё чаще игнорируют распоряжения двора. Возникает реальная угроза новых восстаний в разных концах страны. Положение императора становится всё более шатким — авторитет центральной власти стремительно тает, и промедление может стоить династии трона."
 QIN_counteract_dungans:0 "Противодействовать Дунганам"
 QIN_counteract_dungans_desc:0 "На западных рубежах подняли голову дунганские отряды. Местные гарнизоны не в силах сдержать их натиск. Необходимо направить в регион подкрепления, чтобы не допустить потери контроля над западными провинциями и торговыми путями."
 QIN_counteract_yakub_bek:0 "Противодействовать Якуб-беку"
 QIN_counteract_yakub_bek_desc:0 "Якуб-бек, талантливый и беспощадный полководец, объединяет под своим началом разрозненные отряды на западе. Его сила растёт с каждым днём. Необходимо остановить его продвижение, пока он не захватил ключевые города Синьцзяна."
 QIN_counteract_ma_hualun:0 "Противодействовать Ма Хуалуну"
 QIN_counteract_ma_hualun_desc:0 "Ма Хуалун поднял знамя восстания среди мусульманского населения северо-запада. Фанатично настроенные отряды громят правительственные гарнизоны. Промедление грозит потерей контроля над целыми провинциями."
 QIN_counteract_western_expedition:0 "Противодействовать западной экспедиции"
 QIN_counteract_western_expedition_desc:0 "Повстанческие отряды движутся на запад, захватывая слабозащищённые города. Местные войска деморализованы предыдущими поражениями и не могут оказать серьёзного сопротивления. Срочно перебрасываем подкрепления на западное направление."
 QIN_counteract_northern_expedition:0 "Противодействовать северной экспедиции"
 QIN_counteract_northern_expedition_desc:0 "Северные провинции оказываются под угрозой вторжения мятежников. Стратегически важные коммуникации могут быть перерезаны в любой момент. Укрепляем гарнизоны ключевых городов и готовимся к обороне."
 QIN_offense_on_tianjin:0 "Наступление на Тяньцзин"
 QIN_offense_on_tianjin_desc:0 "Тайпины захватили Нанкин и объявили его своей столицей. Это сердце восстания, потеря которого станет для мятежников смертельным ударом. Необходимо нанести сокрушительный удар по ним, вернув южную столицу под контроль легитимного правительства."
 QIN_end_of_tpn:0 "Конец Небесного Государства Великого Спокойствия"
 QIN_end_of_tpn_desc:0 "Рано или поздно этому восстанию настанет конец. Тайпины и их вожди - Хун Сюцюань, Ян Сюцин и другие - будут повержены. Имперские войска отвоюют Тяньцзин и восстановят контроль над захваченными территориями. Однако эта братоубийственная бойня навсегда останется шрамами на теле страны. Миллионы погибших, разорённые провинции и подорванное доверие к династии - вот цена подавления мятежа."

