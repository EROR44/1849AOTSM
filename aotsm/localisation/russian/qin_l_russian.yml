 QIN_authoritarian_party:0 "Ассоциация поддержки Айсинь Гьоро"
 QIN_authoritarian_party_long:0 "Ассоциация поддержки Айсинь Гьоро - политическое объединение, сформированное сторонниками императора Поднебесной. Его сторонники всячески поддерживают сохранение власти в руках правящей династии, однако многими из них движут не преданность, а личные мотивы."
 QIN_reactionist_party:0 "Ассоциация поддержки Айсинь Гьоро"
 QIN_reactionist_party_long:0 "Ассоциация поддержки Айсинь Гьоро - политическое объединение, сформированное сторонниками императора Поднебесной. Его сторонники всячески поддерживают сохранение власти в руках правящей династии, однако многими из них движут не преданность, а личные мотивы."
