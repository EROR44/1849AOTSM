 qin_viceroys_and_guvernors_chain_event.37.d:0 "      Небо ниспослало Маньчжурской династии великий мандат на управление Поднебесной. Мы, император Великой Цин, внимая воле Неба и следуя заветам предков, даруем сей указ. Усмирение границ, искоренение разбоя и благоденствие народа суть главные заботы Престола. Принимая во внимание верную службу и испытанную добродетель Мао Хунбиня, который ранее являл усердие на благо Отечества, Мы не сомневаемся в его преданности. Посему, превыше всяких сомнений и споров, Мы назначаем Мао Хунбиня на пост вице-короля Лянгуан, жалуя полный титул и серебряную печать для управления вверенными землями.\n\n      Назначенному наместнику повелевается: немедля по получении сего указа прибыть в Гуанчжоу и приступить к делам. Ты будешь ведать всеми военными и гражданскими делами провинции, надзирать за деятельностью чиновников всех рангов, от уездных магистратов до генералов гарнизонов. В твою прямую обязанность входит сбор налогов в полном объёме, содержание ирригационной системы в исправности, а также командование гарнизоном на вверенных землях для подавления любых беспорядков. Ты имеешь право докладывать тронному секретарю напрямую, минуя промежуточные инстанции, но помни: каждое твое решение должно быть взвешенным и во славу династии.\n\n      О сем указе ведать: непослушание приказам наместника карается как нарушение императорской воли. Если же сам наместник пренебрежет службой, допустит рост коррупции или утратит вверенные ему земли — его постигнет высшая мера наказания вплоть до истребления всего рода. Скрижаль Неба и Земли свидетельствует. Да исполнится воля династии Цин. Почтительно служи, и да не посрамишь доверия."
 qin_viceroys_and_guvernors_chain_event.37.a:0 "Утверждаю, [QIN.GetLeader]"

 qin_viceroys_and_guvernors_chain_event.38.t:0 "Императорский указ о назначении вице-королём Юнь-Гуй"
 qin_viceroys_and_guvernors_chain_event.38.d:0 "      Воля Неба неизменна. Мы, Сын Неба, владыка Великой Цин, повелеваем. Страна нуждается не в льстивых речах, но в твёрдой руке. Чен Цзыкай, ранее проявивший верность и твёрдость на благо Отечества, назначается вице-королем региона Юнь-Гуй с правом полного военного и гражданского управления. Ты отвечаешь за спокойствие от гор до моря, от границы до столицы уезда. Престол дарует тебе свою печать — не посрами её.\n\n      В твоём ведении находятся гарнизоны, арсеналы, продовольственные склады и пути сообщения. Ты имеешь право казнить дезертиров на месте, без сношения с Пекином. Ты обязан раз в три месяца доносить тронному секретарю о движении войск, состоянии амбаров и замирении горских племён. Если в провинции вспыхнет бунт — ты первый поднимаешь знамёна, последний садишься в седло. За упущение инициативы последует отставка с конфискацией имущества.\n\n      Помни: династия Цин не прощает слабости. Служи без лести, казни без страха. Если же ты сам поднимешь руку на казну или укроешь вора из страха перед местью — твоя участь будет хуже смерти: проклятие предков и забвение в летописях. Ступай и правь железной рукой в бархатной перчатке."
 qin_viceroys_and_guvernors_chain_event.38.a:0 "Утверждаю, [QIN.GetLeader]"

