 QIN_selection_of_the_successor_desc:0 "Отсутсвие выбранного наследника привело к расколу среди придворных лиц и чиновников. §YЗапретный город§! разделился на §G3§! фракции, поддерждивающие §G3§! кандидатов: §YИчжу§!, §YИсиня§! и §YИсюаня§!.\nУмный и проницательный §YИчжу§! мог бы стать хорошим правителем, но его подводит слабое здоровье. Его главный соперник, §YИсинь§!, — прирожденный воин, сильный и телом, и духом, за которым стоит армия. А вот девятилетний §YИсюань§! кажется остальным лишь тёмной лошадкой — его поддерживает лишь горстка придворных, и в его успех почти никто не верит."

