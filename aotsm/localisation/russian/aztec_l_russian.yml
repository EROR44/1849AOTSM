 aztek_science_manufacturer:0 "Ацтекский исследовательский комплекс"
 
 AZT_millitasrism:0 "Ацтекский милитаризм"
 AZT_millitasrism_desc:0 "Культура ацтеков - в первую очередь культура воинов! Пускай в последние десятилетия данная позиция и стала уходить на второй план, не стоит забывать, что количество потомственных воинов в Ацтекской империи все еще велико, а так же, во многом, настроения в обществе достаточно миллитаризированны и любой сын Отечества готов защитить его и свою семью."
 AZT_consequences_of_the_epidemic_of_1842_idea:0 "Последствия эпидемии 1842 года"
 AZT_consequences_of_the_epidemic_of_1842_idea_desc:0 "Эпидемия холеры, бушевавшая на землях Империи в 1842 году, забрала тысячи жизней сынов Отечества, что привело к серьезным последствиям, ослабившим страну."
 AZT_anti_austrian_moods:0 "Анти-австрийские настроения"
 AZT_anti_austrian_moods_desc:0 "Многолетние отношения с австрийскими колонистами, в основном не выгодные для жителей империи, вместе с их отношением к нации, привели к всеобщему недовольству их деятельностью, хотя наглецов это вряд ли волнует..."
 AZT_aus_trade_monopoly:0 "Австрийская торговая монополия"
 AZT_aus_trade_monopoly_desc:0 "Связанное невыгодными договоренностями с австрийцами, государство фактически вынуждено торговать только с ними, закупая все товары по невыгодным ценам, установленным монополистами."
 AZT_mothballed_ship:0 "Законсервированный корабль"
 AZT_mothballed_ship_desc:0 "Есть в Куэтлаштане судно в заливе Кампече, которое не покидало свою бухту долгие года. Но, вопреки ожиданиям, судно это не брошенное, и не списанное, а вполне себе актуальное. Судном этим является минный крейсер «Acamapichtli», что должен был стать главным достоянием флота и его гордостью. Правда, из всего этого величия мы имеем лишь перегруженную верфь, которая более не способна функционировать в прежних масштабах…\n§RЧтобы убрать национальный дух необходимо изучить СУО.§!"
 AZT_people_militia:0 "Народное ополчение"
 AZT_people_militia_desc:0 "Наша армия, пожалуй, может и не похвастаться сильными регулярными войсками, однако наше ополчение по прежнему мощная опора для государства. В обычный мирный день это все граждане, ацтеки, не выделяющиеся из типичной жизни народа мешика. Но в военные дни все эти граждане становятся ополченцами, защищающие лоно империи, свою родину. Правда все эти ополчения из героев империи накладывают, мягко говоря, ограничения на наши регулярные части, отчего их деятельность затруднена"
 AZT_outdated_army:0 "Старомодная армия"
 AZT_outdated_army_desc:0 "Армия империи до сих пор держится на традициях и нормах времен начала 20 века. С тех пор прошло огромное время, однако за эти 50 лет произошло лишь немного незначительных реформ. Во многом наша армия все еще старомодна, не способна к ведению современной войны, что влечёт за собой серьезные проблемы, что может стать причиной возможных поражений. И хотя в схватке с местными туземными государствами это не грозит разгромом армии, но противостоять мощи европейского оружия нам вряд ли удастся"
 
