 #EVENTS

 azt_random_events.1.t:0 "Наследие «Великой реставрации»"
 azt_random_events.1.d:0 "В этот, как казалось раньше, обычный день в шумном Куэтлаштане произошло поистине историческое событие. Вечером группа изобретателей представила в своей небольшой аудитории свою разработку, затягивая время своей монотонностью. Усталость у зрителей, проработавших на протяжении дня на верфи, заменялась на скуку. Но незадолго до конца эту конференцию посетил нежданный для многих гость. В аудиторию тихо зашел адмирал в сопровождении капитана корабля «Акамапичтли». Того самого минного крейсера, строившегося последний десяток лет, и никогда никому не было до него дела, кроме как к рабочим верфи, которые постоянно обслуживали этот крейсер.\n— Здравствуйте, товарищи! Мы, кажется, немного задержались — с небольшой ухмылкой произнес адмирал.\n— О, мы вас как раз и ждали! Присаживайтесь на места поближе — ответил ученый.\n— И учтите, времени у меня не много, нужно ещё обойти корабль — слегка грубо ответил капитан\n— Ну, не буду долго тянуть... Мы на протяжении последних лет работали над электроприборами для вашего корабля. И знали бы вы, чем у нас будет оснащены корабли. В общем, даже мы изначально не знали.\n\nВсе матросы в аудитории, не отошедшие от удивления из-за присутствия адмирала и капитана, ещё больше напряглись. Капитан, чьи эмоции раньше не выражали сильного интереса, крайне внимательно слушал речь группы изобретателей.\n\n— Из нашего заждавшегося крейсера выйдет не только хороший корабль, он будет нашим первым «флагманом»... — горделиво и медленно говорили новаторы. \n— Эй, а что такое флагман? — шепча, спросил капитан.\n— Это значит командный центр, с него можно будет всем флотом управлять и командовать. — без раздумий прошептал адмирал.\n— ...И доступно это стало с помощью наших недавних разработок. Они позволилят в ближайшем будущем установить электроприборы в наши суда, что поможет координировать действия флота, например, прямо в гуще битвы. И самое главное — это то, что корабль вводится в состояние продолжения строительства. И все мы, не говоря уже о самом Императорском Величестве, будем крайне ждать спуска на воду.\n\nЗал был полон восхищением, хотя, казалось, что оно не было столь из-за гордости, сколько из отчаяния. Но точно было видно одно — капитан и адмирал ликовали и оглядывались на матросов, ещё не очень понимающих о чем шла речь, но они все равно все улыбались и искренне радовались.\n\nПо окончании конференцию покинули все. Почти все. Лишь те 2 опоздавших гостя остались в аудитории. Но дальнейшего разговора не слышал, наверное, никто, кроме их самих. Правда поговаривают, что говорили они о неком будущем пополнении флота."
 azt_random_events.1.a:0 "Величие отечественного флота"