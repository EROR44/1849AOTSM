 TPN_socialism_party_long:0 "Общество поклонения Богу или Бай Шанди хуэй - религиозно-политическая организация, созданная Хун Суцуанем. Одной из главных целей организации является достижение всеобщего равенства, в том числе с помощью отрицания учений Будды и Конфуция."
 

 #лидеры

 TPN_Hong_Xiuquan_t:0 "Хун Сюцуань"
 POLITICS_HONG_XIUNQUAN_DESC:0 "Полное имя: Хун Сюцюань\nДата рождения: 1 января 1814 года\nМесто рождения: деревня Фуюаньшуй, уезд Хуасянь, провинция Гуандун, Империя Цин\n\nРодился в бедной крестьянской семье этнической группы хакка. С детства проявил незаурядные способности к учёбе, за что отец, несмотря на скудность средств, отдал его в деревенскую школу. К двадцати годам Хун сдал первые уровни имперских экзаменов, но дальнейшие попытки получить учёную степень закончились крахом - он трижды проваливал экзамены в столице провинции. Эти неудачи тяжело сказались на его психическом здоровье и финансовом положении семьи.\n\nВ 1837 году, после очередного провала на экзаменах, Хун перенёс тяжёлое нервное расстройство, сопровождавшееся видениями. В бреду ему являлись седовласый старец и муж средних лет, которые оплакивали заблуждения человечества и вручали ему меч для истребления бесов. Позже, после знакомства с христианскими брошюрами, Хун переосмыслил эти видения как встречу с Богом-Отцом и Иисусом Христом, который назвал его «младшим братом».\n\nВ 1843 году, изучив трактаты протестантского миссионера Ляна Фа («Хорошие слова для назидания»), Хун окончательно уверовал в своё божественное призвание. Вместе с двоюродным братом Хун Жэньганем и соседом Фэн Юньшанем он крестился, после чего начал уничтожать в своём доме статуи будд и даосских божеств. Хун стал проповедовать среди хакка учение о едином Шанди (Верховном Владыке), осуждая идолопоклонничество, опиумную зависимость и маньчжурское владычество.\n\nК концу 1840-х годов вокруг Хун Сюцюаня сформировалась тайная община «Общество поклонения Богу», насчитывавшая тысячи последователей в провинциях Гуандун и Гуанси. Фэн Юньшань разработал устав общины и систему военной организации. Хун написал несколько религиозно-политических трактатов, включая «Оригинальный путь предупреждения мира», в которых изложил учение о грядущем «Небесном царстве великого благоденствия». Его авторитет среди последователей был непререкаем - они признавали его прямым посланником Шанди на земле."
