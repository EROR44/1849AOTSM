 #LEADER

 KOR_Hongjong_t:0 "Хонджон"
 POLITICS_HONGJONG_DESC:0 "Полное имя: §YХонджон (Ли Хван)§!\nДата рождения: §G8§! сентября §G1827§! года\nМесто рождения: дворец Чхандоккун, Хансон, Чосон\n\n§YХонджон§! родился за три года до смерти своего отца - наследного принца §YХёмена§!, который ушёл из жизни в возрасте 20 лет, так и не взойдя на престол. Матерью будущего правителя была королева §YСинджон§! из клана Пунъян Чо. Хонджон приходился внуком правившему вану §YСунджо§! и его супруге - королеве §YСунвон§! из могущественного клана §YАндонг Ким§!.\n\nВ §G1834§! году после смерти деда §YСунджо§! семилетний §YХонджон§! взошёл на престол, став самым молодым монархом в истории Чосона. Из-за малолетства реальная власть оказалась в руках его бабушки - королевы-регента §YСунвон§!. Даже после достижения Хонджоном совершеннолетия регентша отказалась передавать контроль над государством. В §G1840§! году, после антикатолических гонений 1839 года, управление королевством окончательно перешло к клану §YАндонг Ким§! - семье королевы Сунвон, которая фактически узурпировала власть."
 KOR_Chkolchon_t:0 "Чхольчон"
 POLITICS_CHKOLCHON_DESC:0 "Полное имя: §YЛи Бён§!\nДата рождения: §G25)§! июля §G1831)§! года\nМесто рождения: Хансон, Чосон\n\n§YЧхольчон§! был третьим сыном принца §YЧонге§! и правнуком короля §YЧонджо§!. Его семья подверглась репрессиям после раскрытия заговора с целью возведения на престол его старшего брата. Сам §YЧхольчон§!, избегая преследований, был вынужден скрываться на острове §YКанхва§! вдали от столицы. Он жил в нищете и §Oне получил§! §Rникакого системного образования§! - будущий правитель был неграмотен и не имел представления о дворцовых порядках.\n\nВ §G1849§! году после смерти бездетного §YХонджона§! перед кланом §YАндонг Ким§! встала задача найти марионеточного правителя. Выбор пал на 18-летнего изгнанника, который не умел читать и не мог понять поздравительное послание по случаю собственной коронации. Безграмотность и неспособность к управлению сделали §YЧхольчона§! идеальной марионеткой для клана. Королевой стала представительница того же клана Андонг Ким — §YЧхорин§!, что ещё больше усилило их контроль над троном"

 #TRAIT

 KOR_andong_kim_puppet_trait: "Марионетка клана Андонг Ким"
 KOR_illiterate_trait:0 "Неграмотен"

 #IDEAS

 KOR_backward_army: "Армия Чосон"
 KOR_backward_army_desc:0 "Армия §YЧосон§! находится в состоянии §Oглубокой стагнации§!. Неоконфуцианская идеология государства отвергает активное военное развитие, а система комплектования страдает от коррупции и нехватки финансирования. Вооружение устарело, боевая подготовка личного состава оставляет желать лучшего. Столкновения с §YЯпонской империей§! в §G1830§!-§G1840§!-х годах продемонстрировали полную неспособность корейских войск противостоять организованному противнику. Модернизация армии §Oтребует§! §Rзначительных реформ§!, которые пока не проводятся."
 KOR_japanese_trade_influence: "Японское торговое влияние"
 KOR_japanese_trade_influence_desc:0 "После подписания §YГангхваского договора§! в §G1836§! году §YКорея§! была открыта для японской торговли. Японские купцы и торговые дома получают всё большее влияние при корейском дворе. Политическое влияние §YЯпонской Империи§! на полуострове §Oусиливается§!, что вызывает беспокойство у традиционалистов и сторонников изоляции."
 KOR_popular_discontent: "Народное недовольство"
 KOR_popular_discontent_desc:0 "Внутри страны нарастает §Oнародное недовольство§!. Реальная власть принадлежит клану §YАндонг Ким§!, который погряз в коррупции и казнокрадстве. Налоги растут, крестьяне разоряются, в городах растет недовольство."