 shk_japan_colonisation:0 "Японская колонизация"
 shk_japan_colonisation_desc:0 "С начала §G1820-х§! волны переселенцев с §YХонсю§! и §YХоккайдо§! превратили §4ледяной§! §YКарафуто§! в «житницу cевера»: порты §YОтомари§! и §YСикука§! кишат китобоями и лесорубами, а в долинах работают угольные шахты.\n\n Сейчас железная дорога до мыса §YКрильон§! связывает колонию с метрополией, но выселение §Yайнов§! и §Yнивхов§! в резервации, произведенное ради ее строительства, имеет свои последствия."
 shk_native_revolt:0 "Местное недовольство"
 shk_native_revolt_desc:0 "Насильственное переселение коренных народов, запрет на язык нивхов и налоги «на цивилизацию» породили подполье. Листовки с призывами «вернуть землю» появляются в портах, а в тайге действуют диверсионные группы. Власти отвечают карательными рейдами, но искра сопротивления лишь разгорается..."
