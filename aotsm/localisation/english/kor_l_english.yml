 #LEADER

 KOR_Hongjong_t:0 "Hongjong"
 POLITICS_HONGJONG_DESC:0 "Full name: §YHongjong (Yi Hwan)§!\nDate of birth: §GSeptember§! §G8§!, §G1827§!\nPlace of birth: Changdeokgung Palace, Hanseong, Joseon\n\n§YHongjong§! was born three years before the death of his father, Crown Prince §YHyomyeong§!, who passed away at the age of 20 without ever ascending the throne. The mother of the future ruler was Queen §YSinjeong§! of the Pungyang Jo clan. Hongjong was the grandson of the reigning king §YSunjo§! and his wife, Queen §YSunwon§! of the powerful §YAndong Kim§! clan.\n\nAfter the death of his grandfather §YSunjo§! in §G1834§!, the seven-year-old §YHongjong§! ascended the throne, becoming the youngest monarch in Joseon's history. Due to his youth, real power fell into the hands of his grandmother, Queen Regent §YSunwon§!. Even after Hongjong came of age, the regent refused to hand over control of the state. After the anti-Catholic persecutions of §G1839§!, by §G1840§! the governance of the kingdom finally passed to the §YAndong Kim§! clan — Queen Sunwon's family, which effectively usurped power."
 KOR_Chkolchon_t:0 "Cheoljong"
 POLITICS_CHKOLCHON_DESC:0 "Full name: §YYi Byeon§!\nDate of birth: §GJuly§! §G25§!, §G1831§!\nPlace of birth: Hanseong, Joseon\n\n§YCheoljong§! was the third son of Prince §YJeongge§! and a great-grandson of King §YJeongjo§!. His family fell victim to repression after the discovery of a plot to place his older brother on the throne. To avoid persecution, §YCheoljong§! himself was forced to hide on §YGanghwa Island§!, far from the capital. He lived in poverty and §Greceived no systematic education§! — the future ruler was illiterate and had no understanding of court customs.\n\nAfter the death of the childless §YHongjong§! in §G1849§!, the §YAndong Kim§! clan faced the task of finding a puppet ruler. The choice fell on the §G18§!-year-old exile, who could not read and failed to understand the congratulatory message regarding his own coronation. Illiteracy and inability to govern made §YCheoljong§! an ideal puppet for the clan. The queen chosen was a representative of the same Andong Kim clan — §YCheorin§!, which further strengthened their control over the throne."

 #TRAIT
 
 KOR_andong_kim_puppet_trait: "Puppet of the Andong Kim Clan"
 KOR_illiterate_trait:0 "Illiterate"

 #IDEAS

 KOR_backward_army: "Joseon Army"
 KOR_backward_army_desc:0 "The army of §YJoseon§! is in a state of §Odeep stagnation§!. The state's Neo-Confucian ideology rejects active military development, while the recruitment system suffers from corruption and a lack of funding. Armament is outdated, and the combat training of personnel leaves much to be desired. Clashes with the §YJapanese Empire§! in the §G1830s§!-§G1840s§! demonstrated the complete inability of Korean troops to resist an organized enemy. Military modernization §Orequires§! §Rsignificant reforms§!, which are not yet being implemented."
 KOR_japanese_trade_influence: "Japanese Trade Influence"
 KOR_japanese_trade_influence_desc:0 "After the signing of the §YGanghwa Treaty§! in §G1836§!, §YKorea§! was opened to Japanese trade. Japanese merchants and trading houses are gaining increasing influence at the Korean court. The political influence of the §YJapanese Empire§! on the peninsula is §Oincreasing§!, causing concern among traditionalists and isolationists."
 KOR_popular_discontent: "Popular Discontent"
 KOR_popular_discontent_desc:0 "§OPopular discontent§! is growing within the country. Real power belongs to the §YAndong Kim clan§!, which is mired in corruption and embezzlement. Taxes are rising, peasants are being ruined, and discontent is growing in the cities."